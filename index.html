quot;href&quot;:[0,&quot;https://github.com/lunarifish&quot;],&quot;icon&quot;:[0,&quot;github&quot;]}],[0,{&quot;label&quot;:[0,&quot;Twitter / X&quot;],&quot;href&quot;:[0,&quot;https://x.com/lunari_io&quot;],&quot;icon&quot;:[0,&quot;twitter&quot;]}],[0,{&quot;label&quot;:[0,&quot;Email&quot;],&quot;href&quot;:[0,&quot;mailto:inbox@lunariio.work&quot;],&quot;icon&quot;:[0,&quot;mail&quot;]}]]],&quot;posts&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;pid-autotune&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;系统辨识+Simulink自动调PID&quot;],&quot;description&quot;:[0,&quot;autotune on&quot;],&quot;date&quot;:[3,&quot;2026-06-03T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;robotics&quot;]]],&quot;draft&quot;:[0,false]}],&quot;body&quot;:[0,&quot;&gt; ref: https://www.yuque.com/g/shixi-tajbq/isf0v5/rrq7ry5hm4f359i9/collaborator/join?token=h2GILX1bKLT5ytPy&amp;source=doc_collaborator#\n\n碰巧遇到信号与系统的期末作业是自由选题，利用这个机会完整的把系统辨识到自动调参跑了一遍。\n\n懒得改了，直接把报告贴过来得了\n\n## 前言\n\n设计机电自动控制系统时，不可避免地会遇到整定PID控制器的Kp、Ki、Kd参数的工作。对于根据经验手动调整这种方式来说，3个相互耦合的参数已经很复杂，实际工程中还涉及到微分项滤波、模糊控制，参数维度常常达到5、6，使得手动调整这些参数费时费力，且严重依赖工程师的调参经验。笔者曾参与过一些机械臂、机器人项目，一个系统里涉及到的电机数量通常多达十几甚至几十个，一个个手动调整这些参数不仅拖慢项目进度，而且通常达不到很好的控制效果。基于以上原因，工程师不能再依靠经验进行参数调整，需要使用更加科学的方法进行PID的参数整定。在这样的背景下，本文介绍一种通过系统辨识获得系统传递函数，从而计算出一套较优的PID参数的方法。\n\n## 实验环境\n\n本文使用一个不带载的GM6020直流无刷电机（下文简称“6020电机”或“电机”）作为被控对象、一块RM C型开发板（STM32F407主控）作为控制器，两者使用CAN总线进行通信。\n\n![](assets/p1.png)\n![](assets/p2.png)\n![](assets/p3.png)\n\n## 模型建立\n\n6020电机的指令值为输出电流，并可通过CAN总线向控制器反馈当前的转速和角度。由于直流无刷电机的电流和输出力矩成线性关系，力矩和角加速度又成线性关系，所以电流指令-转速可看作一个一阶惯性+积分环节。\n\n$$\nG(s)=\\frac{K}{s(\\tau s+1)}\n$$\n\n其中，为从指令值到转速的转换系数，其值未知；为电机的机械时间常数，查阅手册可得到其值为3ms：\n\n![](assets/p4.png)\n\n速度积分即为角度，故角度环的开环传递函数为\n\n$$\nG(s)=\\frac{K}{s^2(\\tau s+1)}\n$$\n\n根据理论模型在Simulink中搭建仿真，用于后续调用PID Tuner进行自动参数整定，三个模型分别为分别为离散速度环，连续速度环和离散角度-速度环：\n\n![](assets/p5.png)\n\n## 数据采集和系统辨识\n\n依次采集速度环和角度环数据，其中速度环反馈为电机实际转速，输入为电流指令值；角度环反馈为电机实际角度，输入为角度误差（双环PID情况下实际上是转速目标）。\n\n![](assets/p6.png)\n\n理论上，只需要辨识一次速度环的传递函数，即可按上文推导出角度环的开环传递函数。但实际工程中需要使速度环先走完一次完整流程，代入一套比较好的速度环参数，之后进行角度环的数据采集，再辨识角度环的传递函数。简单的在速度环上增加一个积分环节得出角度环开环传递函数，这种做法包含一个假设，就是速度环的系统带宽无穷大，可以完美跟踪任何输入的参考速度信号。然而现实并非如此，速度环的系统带宽受电机本身的动力学特性制约，通过代入机械时间常数（3ms）可计算出约为\n\n$$\nf_{\\mathrm{bw}}\\approx\\frac{1}{2\\pi\\times0.003}\\approx53\\ \\mathrm{Hz}\n$$\n\n通过调好速度环之后再对位置环做一次系统辨识的方式，不仅可以使速度环的实际带宽达到理想水平，还能使辨识回归算法吸收掉这种理论误差，实践中通常会得到更好的结果。\n\n根据控制理论，控制器频率需满足\n\n$$\nf_{\\mathrm{control}}\\geq10\\times f_{\\mathrm{bw}}=530\\ \\mathrm{Hz}\n$$\n\n本实验中使MCU运行在1kHz的控制循环频率下，满足理论所需。\n\n根据采样定理，采集实际数据时，采样频率需满足\n\n$$\nf_{\\mathrm{sample}}\\geq2\\times f_{\\mathrm{bw}}=106Hz\n$$\n\n为方便编程，采样频率同样取1kHz。\n\n理论上来说，应使用正弦扫频信号（Chirp信号）作为激励输入给电机，这样可以最充分地激发出电机在各频率下的响应特性。实际考虑到阶跃信号同样具有丰富的频率成分，且相比起来非常容易产生，故在MCU代码中生成一系列阶跃信号作为激励信号输入给电机。\n\n![](assets/p7.png)\n\n用串口采集输入和输出数据。为防止极高频噪声引发混叠现象使信号失真，数据采集完成后，利用filtfilt函数对数据离线做一次零相位低通滤波，作为抗混叠滤波器，其截止频率设置在略低于奈奎斯特频率，即500Hz处。（此处最理想的做法应当是在电机驱动的ADC端做抗混叠滤波，但6020电机的固件无法修改）将数据保存为一个csv文件，读取进工作区后即可打开System Identification工具箱进行系统辨识：\n\n![](assets/p8.png)\n\n设置好零极点数量后，点击拟合即可看到结果。按经验，模型的匹配程度大于80%即可使用。本次实验中由于电机没有带载，扰动较小，匹配程度极高，达到98.34%：\n\n![](assets/p9.png)\n![](assets/p10.png)\n\n把辨识结果填进Simulink模型，就可以进行PID参数的离线整定了。\n\n## PID参数整定\n\n打开Simulink仿真模型中的PID模块，点“调节”按钮：\n\n![](assets/p11.png)\n\n根据图表调整“响应时间”和“瞬态特性”，使曲线超调不大（电机转子本身的惯性导致系统带宽较低，兼顾响应速度的情况下阶跃响应无超调是不可能的）、不反复震荡且响应灵敏，点击“更新模块”即可自动计算参数，并填进Simulink模型的中的PID模块。\n\n![](assets/p12.png)\n\n运行仿真，发现控制效果良好：\n\n![](assets/p13.png)\n\n此时可以把这组参数部署到MCU代码中，目标角度输入同样的阶跃信号，通过串口打印电机反馈的实际角度数据，在串口示波器中观察对比仿真发现控制效果几乎一致，说明系统辨识和离线自动调参均取得了比较好的效果：\n\n![](assets/p14.png)\n\n## 总结\n\n本文介绍的参数整定方法可以在各种工况下快速地给出一组可用的PID参数，经过一段时间的部署验证，在建设好一套基础工具的情况下可以很大程度上减少项目中调参相关的工作量，且屏蔽了工程师人与人之间调参经验的差异。另外，不论自动PID参数整定这一应用，前半部分参数辨识方法本身在控制系统设计方面也具有很大价值。它提供了一种快速获取系统频域模型的方法，其被利用好之后可以用于机械共振抑制、闭环控制器设计等等用途。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/pid-autotune/index.mdx&quot;],&quot;digest&quot;:[0,&quot;4db18c421231c069&quot;],&quot;deferredRender&quot;:[0,true],&quot;collection&quot;:[0,&quot;blog&quot;]}],[0,{&quot;id&quot;:[0,&quot;embedded-memory&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;STM32嵌入式编程的内存管理技巧&quot;],&quot;description&quot;:[0,&quot;No more hardfault!&quot;],&quot;date&quot;:[3,&quot;2026-05-14T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;embedded&quot;],[0,&quot;stm32&quot;]]],&quot;draft&quot;:[0,false]}],&quot;body&quot;:[0,&quot;## 引言：为什么嵌入式系统需要“内存确定性”？\n\n在RM参赛三年的记忆里，尤其是前两年，嵌入式组的所有人都会频繁的遇到所谓”内存跑飞了，进hardfault“之类的玄学问题，发现问题事后的处理方式只是简单的在CubeMX里把那个\&quot;minimum heap size\&quot;调大，问题解决万事大吉，问题不解决回退代码，根因从来没有考虑过。\n\n在PC软件开发中，内存可以近似视为无穷多，巨大的缓冲区/对象、动态分配（`malloc`/`new`）是常态，也不会出什么问题。但在STM32等这种嵌入式系统中，内存不仅稀缺（STM32H7这种高性能型号也只有128K内存，F4/F1更少），而且很脆弱，需要精打细算。\n\n## 程序的内存布局\n\n一个典型的GNU ARM程序在内存中的布局如下：\n\n```SQL\n+------------------+ 低地址 (0x20000000)\n|   .data          | &lt;-- 已初始化的全局/静态变量 (占用Flash和RAM)\n+------------------+\n|   .bss           | &lt;-- 未初始化的全局/静态变量 (仅占用RAM，启动时清零)\n+------------------+\n|   Heap (堆)      | &lt;-- 向高地址增长 (malloc/new 分配的区域)\n|                  |\n+------------------+\n|                  |\n|   Stack (栈)     | &lt;-- 向低地址增长 (局部变量、函数调用上下文)\n+------------------+ 高地址 (RAM顶部)\n\n```\n\n在CubeMX的Memory Management模块里，可以看到STM32的内存映射。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NTdjYzYxMTI5MmU4N2NhODJkMmVkZmM4ODcyNzgxZjlfZWY5Njk3NzQxZDY2ZmY0NWI5Y2MwYWE5M2VlNzNmYWVfSUQ6NzYzOTQyNzA0NTk0NDEwMjA3NF8xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n## 各内存区段在C/C\\+\\+代码里的表现形式\n\n|               | 物理位置          | 存什么数据                                                                                                                                                                           |\n| ------------- | ----------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------ |\n| \\.text段&lt;br/&gt; | Flash（ROM）&lt;br/&gt; | - 所有的函数体代码。&lt;br/&gt;- 字符串常量（如 `printf(\&quot;Hello World\\n\&quot;);` 中的 `\&quot;Hello World\\n\&quot;`）。&lt;br/&gt;- 被 `const` 修饰的全局变量或 `static` 局部变量。                                |\n| \\.data段      | Flash和ROM        | 程序烧录在Flash中，在单片机上电启动时，启动代码会将这部分数据从Flash拷贝到RAM中，之后程序在RAM中读写它。&lt;br/&gt;- 初始化为非零值的全局变量。&lt;br/&gt;- 初始化为非零值的 `static` 局部变量。 |\n| \\.bss段       | RAM               | - 未初始化的全局变量。&lt;br/&gt;- 初始化为零值的全局变量（如 `int sensor_value = 0;`，编译器会智能地将其归入`.bss`而非`.data`）。&lt;br/&gt;- 未初始化或初始化为零值的 `static` 局部变量。      |\n| 堆&lt;br/&gt;       | RAM               | - 调用C语言的 `malloc()`, `calloc()`, `realloc()` 分配的内存。&lt;br/&gt;- 调用C\\+\\+的 `new` 操作符分配的内存。                                                                            |\n| 栈            | RAM               | - 函数内部的局部变量（非static修饰）。&lt;br/&gt;- 函数的参数传递（在ARM架构中，前几个参数用寄存器传递，超出部分压栈）。&lt;br/&gt;- 函数调用的返回地址、中断发生时的上下文保存。                |\n\n举个例子，下面不同的实例化一个对象的方式，会把这个对象放到不同的内存区域：\n\n- `Sensor s1;` （局部对象）： 栈\n\n- `static Sensor s2;` （静态局部/全局对象）： `.bss` 或 `.data`\n\n- `Sensor *s3 = new Sensor();` （动态对象）： 堆\n\n- `Sensor *s4 = new (buffer) Sensor();` （placement new）： 取决于 `buffer` 所在的区段\n\n## 几个内存问题引发的暗坑\n\n### 堆栈溢出\n\n第1节提到，堆栈二者共存在同一块物理内存空间里，栈向下生长，堆向上生长。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YmEwZDRkOTNjMDBmYTVkMjE0MzA5M2I0MzRjN2U5M2NfM2MyZGY3MTM5MWM3NmUxMzdlMzhlMWE1ODEyZDA4NjFfSUQ6NzYzOTQzMDcxNzQzMjIzNzI1MV8xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n每调用一次`new()`，堆就会生长一点；每调用一个函数，调用栈和局部变量就会使得栈生长一点。如果两者相遇，数据就会被互相覆盖，引发诡异的问题。或者更常见的情况是，STM32的保护机制会触发Hardfault中断把程序杀死，防止发生一些危险的情况。\n\n### 堆内存碎片\n\nhttps://zhuanlan.zhihu.com/p/589406667\n\n### 不可静态分析\n\n如果要对内存精打细算，首先得对程序的内存占用有定量的认识。在编译完成后，链接器会抛出一段静态分析，理想情况下，这些信息确实能代表程序内存占用情况：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YmIwMzZlNzcyMjM4YTM3NDNmMzQwNDk3MTJiYmNkYWJfZTcwMDg4ZjkwYTMxZmM5YmRmMjRkYmMzNGY5MjUyZDNfSUQ6NzYzOTQzNTQzNDAwNjgwOTc5M18xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n有时候这里的RAM占用很小，但是程序依旧跑死。实际上是因为这种静态内存分析只能分析到编译期就可以确定大小的内存，比如全局变量、static变量。链接器没办法知道程序跑起来会调用哪些函数、调用几次new，当然也没办法确切知道程序会用多少内存。\n\n## 核心原则\n\n从以上分析可以得出，嵌入式场景下的内存管理：\n\n- **确定性强的是好的，确定性弱的是坏的。**\n\n- **编译期确定是好的，运行时确定是坏的。**\n\n把每一个字节的内存牢牢把握在自己手里，而不是晕乎乎的调用vector\\.push_back，new，却不知道这些东西在对内存做什么操作。\n\n## 用几种好的实践规避以上问题\n\n### 不用`new`、`malloc`\n\n1. 动态分配最明显的问题就是会导致内存碎片。\n\n2. 此外，由于动态分配还会触发C标准库的分配算法，它会遍历空闲链表寻找合适的内存块，而这个算法的执行时间不可预测，所以可能会打破程序的实时性。\n\n3. 我见到很多这种写法：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MjBjZDQ1NzljN2JhZGM0NzYxY2JiMWI1ZTMxZjI1Y2FfM2Q0MTY0NGM3ZjM1NGQ5ODY4OGQxYWI3M2Q4ZThlNDRfSUQ6NzYzOTQzOTIyMjkyMjg3MzgxNl8xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n这样写会导致`Globals`这个结构体根本没法被静态分析。不管`MahonyAhrs`、`PID`两个类多大，`Globals`的大小永远是两个指针的大小，8字节：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZWU3Yjc3NjlhOGIwM2I2MTM0MWQ4ZGY1YzE2YzM3NWVfNDgzNTlmMjQzYmZhNTJmMjg4MzUyMDE4YWJiN2VhNmVfSUQ6NzYzOTQ0Mjc1Mjg3NDMzNTE5OV8xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n这种写法不是好的风格，完全不值得提倡。即使有时候需要用到，也是因为`librm`早期设计考虑不足，某些对象需要等HAL库初始化完成之后再构造，是作为一种延迟初始化的手段。\n\n如果用正常的写法，可以清楚的看到`Globals`占用了888字节内存：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MDlhZTI2YWE3NmExYWQ3NmUzMWFhZDMwNmE4OTMzYjdfN2FjYTBiZGJmNGMxMzE5ZjIwYmIyOWU0NzBlN2ZjZjRfSUQ6NzYzOTQ0MjY0NzI0MDgyMTY5Nl8xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n### 不用STL容器\n\nETL库作为一个强调内存确定性的STL替代，已经整合在librm里，随时可用。如果一定要用STL容器，就去用ETL里的替代品：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MGI3ZjU1MDVlM2Y4NjQ4ZWJmNzk0NGViMjEwYTljYThfNzAyMGNhZWIwMDdmMTJmNjMyODdjZTQ2NmIzYzZhY2RfSUQ6NzYzOTQ0MzcxMTAwMDEzNjkwN18xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OGFiYTVlZjVkNjY1OTU3OWViZTJjMzY1NTEyMjMwNTdfNTY4MTY3MDRiZTY0ZmM3MmZlMzRkMTc5YTRmZGQ0ZGNfSUQ6NzYzOTQ0Mzc1NzQzOTUxOTk0M18xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\n### placement new\n\n如果因为一些初始化时序问题，非要用new不可，比如这样，那`Globals`用到的这块内存其实依旧是运行期确定的，不会被链接器算进内存占用。可以做一个实验，有没有`globals = new Globals;`这行代码，编译完成之后输出的内存占用都是一样的。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NmVjNjUzZjg3MTdhZmQ3ODcxMWI1NzUxOGJkNzU0NWFfNDA2MGI4NmM2Yzc5OTQyN2YwMTI5YzJiMGE1MTVlMGZfSUQ6NzYzOTQ0NjA4Njk0NzUwNzE3M18xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)\n\nC\\+\\+有一项功能叫\&quot;placement new\&quot;，顾名思义，就是可以把对象new在一个确定的位置，而不是让C标准库自己随便在堆区分配一个位置。建一个大小和`Globals`相同的全局uint8数组，然后把`Globals`放进去，这样编译期就可以计算这块全局区域的大小，也达成了延迟初始化的目的：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MmQ3Nzc1ZDcxNzI3MmMzNWJlZTliNjBkY2U3YjQ0YTNfNmNmZjk0NWQ5ODVjNTdkNjg2Y2QxYzQ0NzNmNjZiNTBfSUQ6NzYzOTQ0NjA0NTUyMDQ0ODQ1NV8xNzgwOTQ0NDIwOjE3ODEwMzA4MjBfVjM)&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/embedded-memory/index.mdx&quot;],&quot;digest&quot;:[0,&quot;db8cd718318f5bc9&quot;],&quot;deferredRender&quot;:[0,true],&quot;collection&quot;:[0,&quot;blog&quot;]}],[0,{&quot;id&quot;:[0,&quot;2dof-gimbal-dynamics&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;二轴云台的动力学前馈&quot;],&quot;description&quot;:[0,&quot;简单有效地提升云台的动态目标跟踪能力&quot;],&quot;date&quot;:[3,&quot;2026-04-04T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;robotics&quot;]]],&quot;draft&quot;:[0,false]}],&quot;body&quot;:[0,&quot;import AdaptiveFormula from \&quot;../../../components/react/AdaptiveFormula\&quot;;\n\n## 1. 动力学模型原理\n\n一个2dof云台的受力规律可以由标准的机器人动力学方程描述：\n\n$$\n\\tau = M(q)\\ddot{q} + C(q, \\dot{q})\\dot{q} + G(q) + \\tau_{fric}\n$$\n\n各部分的物理意义为：\n\n$\\tau = [\\tau_1, \\tau_2]^T$：电机实际需要输出的力矩（Yaw 与 Pitch）。\n\n$q, \\dot{q}, \\ddot{q}$ ：云台的角度、角速度、角加速度。\n\n$M(q)$ \\(惯性矩阵\\) ：描述系统自身的惯性大小。随云台姿态（特别是由 Pitch 角度变化）而改变。\n\n$C(q, \\dot{q})$ \\(科里奥利力与离心力矩阵\\)：描述两轴联动时的陀螺仪效应和耦合力。例如 Yaw 高速旋转时对 Pitch 轴产生的甩动力。\n\n$G(q)$ \\(重力/空间平动力矩\\)：描述质心偏离旋转轴时，重力或底盘平动加速度在轴上产生的静力矩。\n\n$\\tau_{fric}$ \\(摩擦力矩\\)：包含粘滞摩擦（随速度变化的阻力）和库仑摩擦（恒定的干摩擦阻力）。\n\n## 2. 模型推导\n\n下面详细展开利用拉格朗日力学推导出一个2-dof云台动力学方程的全过程。\n\n拉格朗日分析法的优点是步骤非常固定，但计算相对牛顿力学的受力分析要复杂得多，但因为可以用sympy完成这些计算，不需要自己手算这些比命还长的微积分，所以无所吊谓：\n\n1. 计算系统的总动能 \\($K$\\) 和总势能 \\($P$\\)\n\n2. 构建拉格朗日函数$L=K-P$\n\n3. 代入拉格朗日方程：\n\n$$\n\\frac{d}{dt}(\\frac{\\partial{L}}{\\partial{\\dot{q}}})-\\frac{\\partial{L}}{\\partial{q}}=\\tau\n$$\n\n### 2.1. 定义运动学（坐标系与转动）\n\n定义坐标系为前X\\+左Y\\+上Z\\+：（[REP-105](https://www.ros.org/reps/rep-0105.html)）\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZThiZTdhYTllYzg3YWVmMzM3ZGY0NGQxMjQ0MGY0OWNfNmY3ZTU4ZjUwNGZkYmJhOWE4ZTg3NWNjOGE2ZWY2ZjBfSUQ6NzYyNDc1MDU1MjcxMDE3MTYwMl8xNzgwOTAxODQ2OjE3ODA5ODgyNDZfVjM)\n\n云台有两个旋转轴，决定部件在空间中的姿态。\n\n1. Yaw 轴 \\(转子1\\)：绕大地坐标系的 $Z$ 轴旋转，角度为 $q_1$。\n\n   $$\n   R_1 = \\text{RotZ}(q_1)\n   $$\n\n2. Pitch 轴 \\(转子2\\)：安装在 Yaw 轴之上，绕自身的局部 $Y$ 轴旋转，角度为 $q_2$。它受yaw带动，所以它的世界姿态是两者叠加。\n\n   $$\n   R_2 = R_1 \\cdot \\text{RotY}(q_2)\n   $$\n\n### 2.2. 追踪各部分的质心位置 \\($p$\\) 与速度 \\($v$\\)\n\n我们要知道转动时，每个部件重心的精确位置。引入偏心距概念：\n\n- yaw轴偏心：重心在旋转轴上有上下偏移 $l_1$。\n\n重心位置： $p_1 = [0, 0, l_1]^T$。\n\n- pitch轴双向偏心：我们假设pitch轴的重心只在X轴和Z轴上有偏移（在自己坐标系的 $X$ 和 $Z$ 轴上分别偏移了 $l_{2x}$ 和 $l_{2z}$），如果还考虑Y轴（左右）偏心的话计算会过于复杂。它不仅自己偏心，还被安装在yaw轴的偏心点上。\n\n重心位置： $p_2 = p_1 + R_2 \\cdot [l_{2x}, 0, l_{2z}]^T$。\n\n对位置求导 \\(`sp.diff(p, t)`\\)，就得到了系统各部分的线速度$v_1, v_2$。\n\n### 2.3. 计算角速度 \\($\\omega$\\) 并转换到局部坐标系\n\n我们要计算各部件的旋转快慢，且为了方便乘以惯量张量，角速度必须转换到它们各自的本体坐标系下。\n\n- yaw的空间角速度就是绕z轴转 $\\dot{q}_1$。转换到自己参考系：$w_{1\\_local} = R_1^T \\cdot w_{1\\_world}$。\n\n- pitch的空间角速度是yaw带动的角速度加上自身相对yaw的角速度。转换到自己参考系：$w_{2\\_local} = R_2^T \\cdot w_{2\\_world}$。\n\n### 2.4. 计算系统的动能 \\($K$\\) 与势能 \\($P$\\)\n\n汇总整个系统所有平动和转动的能量：\n\n- **总动能**$K$：\n\n每个部件的动能 = 平动动能 \\($\\frac{1}{2} m v^T v$\\) \\+ 转动动能 \\($\\frac{1}{2} w_{local}^T I w_{local}$\\)。\n\n这里的 $I$ 就是由 $I_{xx}, I_{yy}, I_{zz}$ 构成的惯量矩阵。把云台yaw和pitch的平动与转动全加起来，就得到总动能公式$K$：\n\n&lt;AdaptiveFormula\n  client:load\n  formula=\&quot;K=\\displaystyle 0.5 I1zz \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + 0.5 I2xx \\sin^{2}{\\left(q_{2}{\\left(t \\right)} \\right)} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + 0.5 I2yy \\left(\\frac{d}{d t} q_{2}{\\left(t \\right)}\\right)^{2} + 0.5 I2zz \\cos^{2}{\\left(q_{2}{\\left(t \\right)} \\right)} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + 0.25 m_{2} \\left(l2x^{2} \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + l2x^{2} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + 2 l2x^{2} \\left(\\frac{d}{d t} q_{2}{\\left(t \\right)}\\right)^{2} + 2 l2x l2z \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} - l2z^{2} \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + l2z^{2} \\left(\\frac{d}{d t} q_{1}{\\left(t \\right)}\\right)^{2} + 2 l2z^{2} \\left(\\frac{d}{d t} q_{2}{\\left(t \\right)}\\right)^{2}\\right)\&quot;\n/&gt;\n\n- **总势能**$P$：\n\n我们只考虑重力势能，如果假设云台的基座是不动的话，那只需要定义重力加速度$g$为$[0 \\ 0 \\ -9.81]m/s^2$即可，但在机载环境下，底盘的加减速会产生额外的惯性力，导致云台受到扰动，pitch轴表现为车前后加速时会抬头、低头，左右加速时yaw会左右甩。这种扰动可以通过云台基座，即底盘上的加速度计测量出来。不妨把基座加速度计的测量值作为一个动态重力场$g_{vec} = [g_x, g_y, g_z]^T$纳入模型考虑，即可优雅地补偿掉底盘平动加速度对云台造成的扰动。\n\n每个部件的势能 = 质量 \\* 在重力场方向的位置。\n\n$P1 = -m_1 (g_{vec}^T \\cdot p_1)$，以此类推，求和得到 $P$。和上面的K一样，表达式过于抽象，这里就不放了。\n\n### 2.5. 求解动力学三大矩阵 \\($M, C, G$\\)\n\n此时我们拿到了K和P，可以把这两项直接无脑代入拉格朗日方程，但是这样会得到一个非常抽象的二阶微分方程，后续就很难处理了。我们需要把结果整理成$\\tau = M(q)\\ddot{q} + C(q, \\dot{q})\\dot{q} + G(q) + \\tau_{fric}$这种形式。\n\n让AI介绍了一下计算这三个分量的数学原理，不感兴趣的话直接跑代码即可：\n\n---\n\n#### 惯性矩阵 $M(q)$ 的提取原理\n\n**物理含义**：$M(q)$ 是系统等效的“质量”。由于云台姿态变化，各转子的相对位置在变，系统对于各个轴的等效转动惯量也是动态变化的（比如 Pitch 俯仰时，Yaw 感受到的整体惯量会变）。\n\n**数学原理**：\n\n在多刚体系统中，总动能 $K$ 一定可以写成角速度的二次型（即角速度的平方项或乘积项），其标准矩阵形式为：\n\n$$\nK = \\frac{1}{2} \\dot{q}^T M(q) \\dot{q} = \\frac{1}{2} \\sum*{i} \\sum*{j} M\\_{ij}(q) \\dot{q}\\_i \\dot{q}\\_j\n$$\n\n**代码实现**：\n\n因为 $K$ 中包含了 $\\dot{q}_i \\dot{q}_j$ 和 $M_{ij}$ 的组合，我们要把 $M_{ij}$ 提出来，最简单的办法就是对动能连求两次速度的偏导。\n\n就像求 $y = \\frac{1}{2} a x^2$ 中的 $a$，连求导两次即得到 $a$。\n\n```python\nM[i, j] = sp.simplify(sp.diff(sp.diff(K, dq[i]), dq[j]))\n```\n\n#### 科里奥利力与离心力矩阵 $C(q, \\dot{q})$ 的提取原理\n\n**物理含义**：\n\n- **离心力 (Centrifugal)**：部件自转时产生的向外甩的力，与自身角速度的平方 $\\dot{q}_i^2$ 成正比。\n\n- **科里奥利力 (Coriolis)**：两个轴同时运动时产生的耦合拉扯力，与两轴角速度的乘积 $\\dot{q}_i \\dot{q}_j$ 成正比。（例如，Yaw 正在高速转，此时你往上抬 Pitch 轴，会感觉到一股奇怪的侧向力扭动 Yaw 轴）。\n\n**数学原理**：\n\n拉格朗日方程中的 $\\frac{d}{dt} \\left( \\frac{\\partial K}{\\partial \\dot{q}_i} \\right)$ 这一项。因为 $M(q)$ 本身是随时间变化的（随着 $q$ 变而变），所以对其求时间导数时，会根据链式法则产生 $\\frac{\\partial M}{\\partial q} \\dot{q}$ 这种项。\n\n这堆导数展开后非常庞大，为了确保矩阵运算不乱，数学家引入了**第一类克里斯托费尔符号 (Christoffel symbols of the first kind)** $c_{ijk}$，它可以完美捕捉 $M$ 矩阵随着角度 $q$ 变化的偏导数：\n\n$$\nc*{ijk} = \\frac{1}{2} \\left( \\frac{\\partial M*{kj}}{\\partial q*i} + \\frac{\\partial M*{ki}}{\\partial q*j} - \\frac{\\partial M*{ij}}{\\partial q_k} \\right)\n$$\n\n**代码实现**：\n\n然后将克里斯托费尔符号与对应速度相乘并累加，就得到了 $C$ 矩阵的元素 $C_{kj}$。这种做法不仅严谨，还能保证算出来的 $M$ 的导数减去 $2C$ 是一个偏对称矩阵（这是后续设计无源性控制的基础特性）。\n\n对应代码：\n\n```python\nc_ijk = 0.5 * (sp.diff(M[k, j], q[i]) + sp.diff(M[k, i], q[j]) - sp.diff(M[i, j], q[k]))\nc_kj += c_ijk * dq[i]\n```\n\n#### 重力/外力场势能向量 $G(q)$ 的提取原理\n\n**物理含义**：当云台处于倾斜状态时，因为重心偏离了旋转中心，重力（或底盘加减速导致的惯性力）会试图把云台往下拽。$G(q)$ 计算的就是为了克服这个拉力，电机需要提供的静力矩。\n\n**数学原理**：\n\n力和势能的关系是：**保守力 = 势能梯度的负值**。\n\n而在拉格朗日方程中，$-\\frac{\\partial L}{\\partial q_i}$ 这一项里的 $L = K - P$。因为势能前有一项负号，两者抵消，变成了正的 $\\frac{\\partial P}{\\partial q_i}$。\n\n也就是说，系统想要往势能最低的地方走，电机需要输出的拉力 $G$ 等于势能 $P$ 对关节角度 $q$ 的导数。\n\n**代码实现**：\n\n非常简单直接，用总势能对各自的角度求一次导数即可。\n\n对应代码：\n\n```python\nG[i, 0] = sp.simplify(sp.diff(P, q[i]))\n```\n\n---\n\n运行上面的python代码可以可以计算出\n\nM：\n\n&lt;AdaptiveFormula\n  client:load\n  formula=\&quot;\\displaystyle \\left[\\begin{matrix}1.0 I1zz + 1.0 I2xx \\sin^{2}{\\left(q_{2}{\\left(t \\right)} \\right)} + 1.0 I2zz \\cos^{2}{\\left(q_{2}{\\left(t \\right)} \\right)} + 0.5 m_{2} \\left(l2x^{2} \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} + l2x^{2} + 2 l2x l2z \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} - l2z^{2} \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} + l2z^{2}\\right) &amp; 0\\\\0 &amp; 1.0 I2yy + 1.0 m_{2} \\left(l2x^{2} + l2z^{2}\\right)\\end{matrix}\\right]\&quot;\n/&gt;\n\nC：\n\n&lt;AdaptiveFormula\n  client:load\n  formula=\&quot;\\displaystyle \\left[\\begin{matrix}0.5 \\left(I2xx \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} - I2zz \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} + m_{2} \\left(- l2x^{2} \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} + 2 l2x l2z \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} + l2z^{2} \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)}\\right)\\right) \\frac{d}{d t} q_{2}{\\left(t \\right)} &amp; 0.5 \\left(I2xx \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} - I2zz \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} + m_{2} \\left(- l2x^{2} \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} + 2 l2x l2z \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} + l2z^{2} \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)}\\right)\\right) \\frac{d}{d t} q_{1}{\\left(t \\right)}\\\\- 0.5 \\left(I2xx \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} - I2zz \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} + m_{2} \\left(- l2x^{2} \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)} + 2 l2x l2z \\cos{\\left(2 q_{2}{\\left(t \\right)} \\right)} + l2z^{2} \\sin{\\left(2 q_{2}{\\left(t \\right)} \\right)}\\right)\\right) \\frac{d}{d t} q_{1}{\\left(t \\right)} &amp; 0\\end{matrix}\\right]\&quot;\n/&gt;\n\ng：\n\n&lt;AdaptiveFormula\n  client:load\n  formula=\&quot;\\displaystyle \\left[\\begin{matrix}m_{2} \\left(gx \\sin{\\left(q_{1}{\\left(t \\right)} \\right)} - gy \\cos{\\left(q_{1}{\\left(t \\right)} \\right)}\\right) \\left(l2x \\cos{\\left(q_{2}{\\left(t \\right)} \\right)} + l2z \\sin{\\left(q_{2}{\\left(t \\right)} \\right)}\\right)\\\\m_{2} \\left(gx \\left(l2x \\sin{\\left(q_{2}{\\left(t \\right)} \\right)} - l2z \\cos{\\left(q_{2}{\\left(t \\right)} \\right)}\\right) \\cos{\\left(q_{1}{\\left(t \\right)} \\right)} + gy \\left(l2x \\sin{\\left(q_{2}{\\left(t \\right)} \\right)} - l2z \\cos{\\left(q_{2}{\\left(t \\right)} \\right)}\\right) \\sin{\\left(q_{1}{\\left(t \\right)} \\right)} + gz \\left(l2x \\cos{\\left(q_{2}{\\left(t \\right)} \\right)} + l2z \\sin{\\left(q_{2}{\\left(t \\right)} \\right)}\\right)\\right)\\end{matrix}\\right]\&quot;\n/&gt;\n\n理论推导结束，通过这个模型（$\\tau = M(q)\\ddot{q} + C(q, \\dot{q})\\dot{q} + G(q) + \\tau_{fric}$），我们可以计算出对于一个移动基座上的yaw\\-pitch二轴云台，两个轴输出多大的力矩可以到达某个运动状态（位置、角速度和角加速度）。\n\n但我们还差一步，就是得到模型中的$m$、$l$这些物理参数的值是多少，根据经验从solidworks图纸里面看肯定是不准的，所以需要实验做参数辨识。\n\n## 3. 参数辨识原理\n\n到这一步，$M, C, G$ 矩阵中包含了大量的诸如 $m_2 \\cdot l_{2x}^2 + I_{2zz}$ 这样纠缠不清的参数和复杂的三角函数。\n\n为了能够计算必须进行参数仿射提取。我们将所有角度相关的三角函数项作为已知条件，把所有物理常量打包成互不依赖的独立集合。在代码中这体现为 `.jacobian()` 的提取操作，最终把极其复杂的能量导数，拍扁成了 `Y_matrix * Pi` 这种可以直接用最小二乘法回归的线性代数方程。\n\n为了保证系统辨识中的矩阵满秩（可解），我们将系统状态提取为9个独立的基础参数（即代码中的 $\\theta_1$ 到 $\\theta_9$）。\n\n我们将这 9 个参数构成向量 $\\theta$，将当前的状态数据经过三角函数计算后构成回归矩阵 $Y$ ，得到一个线性方程$Y(q, \\dot{q}, \\ddot{q}) \\theta = \\tau$，实验采集大量$Y(q, \\dot{q}, \\ddot{q})$和$\\tau$的数据点，即可用最小二乘法回归出$\\theta$的准确值。\n\n## 4. 怎么利用这个模型\n\n上面说到，通过这个模型（$\\tau = M(q)\\ddot{q} + C(q, \\dot{q})\\dot{q} + G(q) + \\tau_{fric}$），我们可以计算出对于一个移动基座上的yaw\\-pitch二轴云台，两个轴输出多大的力矩可以到达某个运动状态（位置、角速度和角加速度）。\n\n自瞄对敌方进行整车建模之后，可以预知目标未来一段时间的运动轨迹，换一种说法，其实就是知道自己的云台未来一段时间的运动轨迹。在任意时间点，我们都知道自己的云台处于什么样的位置、速度和加速度状态下，可以完美跟踪自瞄那边想瞄准的点。由于纯PID控制是一种“被动响应”的反馈策略，只有当云台实际位置偏离期望位置产生误差后，才会输出力矩进行纠正，所以实际上用纯PID实现没有误差的跟踪是不可能的。\n\n利用这个前馈模型，系统能够根据自瞄那边规划好的运动轨迹，利用物理规律提前“预判”并主动输出目标运动所需的理论控制力矩，直接在底层抵消掉重力、离心力与干摩擦带来的已知影响。动力学前馈 \\+ PID这种组合使前馈模型承担了绝大部分确定的物理阻力，使得 PID 控制器被解放出来。此时的PID仅需负责应对极其微小的模型误差和不可测的外部扰动（比如线材拉扯）。这样就可以解决PID需要用误差驱动，但我们又不想要误差的矛盾。\n\n对比有无动力学前馈，下面是让测试云台的pitch轴跟踪一个动态目标的误差曲线：\n\nPID参数是随便调的，整体控制效果不是很好，误差比较大，但是可以看到有前馈的情况下，误差要小得多：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MzAwYTY5OTkyOGQwMDI0YmE3MTgxYjFmOTk3ZWMyODlfMzQxNDFmM2FiMjU5YjA5MDI1NDBlZTQ1MzJiZDczYWNfSUQ6NzYyNDc2MzQ5MDY4ODM3MTkzN18xNzgwOTAxODQ2OjE3ODA5ODgyNDZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YjkyYTE0OTBmYWY5MmVkZTA5MjliMGYwY2RhOWJkOTdfMGEyZTdiNGY0Y2I5MzcwOGIwODBhZTNiNDVkMTg1NmFfSUQ6NzYyNDc2MzUxNTI2MTMyNDUwMF8xNzgwOTAxODQ2OjE3ODA5ODgyNDZfVjM)\n\n## 5. 部署、调试方法\n\n所有离线和在线计算的代码均已经整理到 https://github.com/XDU-IRobot/gimbal-tool-suite 。参考README即可完成参数辨识和部署流程。\n\n## 6. 改进方向\n\n上面提到了一种在建模时用动态重力表示势能，从而实现补偿云台基座平动加速度的方法。然而如字面意思，这种方法只能补偿平动加速度，不能补偿底盘的角加速度。待找到一种优雅的办法解决这个问题。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/2dof-gimbal-dynamics/index.mdx&quot;],&quot;digest&quot;:[0,&quot;9997aa4e9b472905&quot;],&quot;deferredRender&quot;:[0,true],&quot;collection&quot;:[0,&quot;blog&quot;]}],[0,{&quot;id&quot;:[0,&quot;stm32-svd-collection&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;STM32 SVD大全&quot;],&quot;description&quot;:[0,&quot;&quot;],&quot;date&quot;:[3,&quot;2025-09-17T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;embedded&quot;],[0,&quot;stm32&quot;]]],&quot;draft&quot;:[0,false]}],&quot;body&quot;:[0,&quot;https://github.com/modm-io/cmsis-svd-stm32\n\n这个项目收录了基本所有STM32型号对应的svd文件\n\n用clion或者ozone调试的时候可以加载svd文件来看寄存器，比查手册对着看方便\n\n## 食用方法↓↓\n\n### CLion\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MWExZTNiZjFiNDFkY2MzZWQ5Y2I5MjBmYWNjN2I2ODlfOGI2YjliNTI2NDYxZTZkMzYwMjRmYjE2YjdjNzVhMDhfSUQ6NzU1MTAzMjA3OTYyNTA5MzEyNF8xNzgwOTQ2NDU5OjE3ODEwMzI4NTlfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZDFhZDZmMjQ1ZTNlNTZmNTc2YTY4MjkzZmE0ZWYzMDJfOThiMDcyMjUxMTRkNzQ1YmMwOTcyZTJkYTE1ODU5N2NfSUQ6NzU1MTAzMjI3MDM3NjE3MzU3MV8xNzgwOTQ2NDU4OjE3ODEwMzI4NThfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NjZlYjNhZDcwM2U2MmRjOTJhY2IyYmNhNDYzMzA5ZWRfYjJhNGY1NWQ2ZmQxYmQyZjNjODllY2JhYTI5YzFhNjFfSUQ6NzU1MTAzMjQ0OTAzNjQ4NDYxMV8xNzgwOTQ2NDU4OjE3ODEwMzI4NThfVjM)\n\n### Ozone\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZWQ4YmNjMGI4YjEzMGFiM2ZhNTAyNDQzYjQyYzgyMjdfNjZjNWE1YTkxMWY3ZjUzNzgyZGU1NjA4YzJmNWJiM2NfSUQ6NzU1MTAzMjgwMjg2MzY5Mzg1Ml8xNzgwOTQ2NDU5OjE3ODEwMzI4NTlfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZWZhODI0YWJkNzA0MTIwZmJhZDA3Y2NkYzU2MDJhZjZfMmFhYzYzNDQxMmZiMmEzMTQ5ZmZiNWIzYjU4MzQ4NzZfSUQ6NzU1MTAzMjg1MzU1NjE4MzA2OF8xNzgwOTQ2NDU5OjE3ODEwMzI4NTlfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MjRjYzhjYmNjM2Y4NmEyNjM1MGI2MDgzMTQ5OTJjMzhfY2QzYjViYTE3YzE2YTkwZWM1MjdiZGE0ZmQ0ZDQ4N2NfSUQ6NzU1MTAzMzI2NjAxOTY0NzQ5MF8xNzgwOTQ2NDU5OjE3ODEwMzI4NTlfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MjJlZGIyNzdhMWE2MzljMjhkMzBiNTM5ZTU5MWM0NjBfM2MzMjRkMGNjMjJjMDYzMzc0YzJkYWZlZGRiNDM3OGZfSUQ6NzU1MTAzMzU0OTM3OTM3MTAxMV8xNzgwOTQ2NDU4OjE3ODEwMzI4NThfVjM)&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/stm32-svd-collection/index.mdx&quot;],&quot;digest&quot;:[0,&quot;14aabef23a1c84fc&quot;],&quot;deferredRender&quot;:[0,true],&quot;collection&quot;:[0,&quot;blog&quot;]}],[0,{&quot;id&quot;:[0,&quot;engineer-devlog&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;25~26赛季 工程开发笔记&quot;],&quot;description&quot;:[0,&quot;fluorite amorph&quot;],&quot;date&quot;:[3,&quot;2025-01-30T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;robotics&quot;]]],&quot;draft&quot;:[0,false]}],&quot;body&quot;:[0,&quot;这里用来跟踪开发进度，还有记录25、26赛季两年时间里，我研究工程机械臂的思路、资料，方便后面写技术报告的时候取材，如果对后来人有帮助就更好了\n\n\n\n两年的技术报告，虽然因为凹分数里面有注水和吹牛成分，但是还是有一定参考价值，可以把这篇笔记和技术报告结合起来看\n\n25年的技术报告：[技术方案-工程](https://w0ybodqyg7f.feishu.cn/wiki/SXkfwigPkipjwSkic7DcjFvanbf)\n\n26年的技术报告：[技术方案（工程）](https://w0ybodqyg7f.feishu.cn/wiki/N0R3wqER2i65dHkGYtcc9EkmnKg?from=from_copylink)\n\n\n\n其他一些深度学习相关的玄学方法先不谈，用传统方法做自动机械臂可以按顺序把全流程拆解成下面四个问题：\n\n1. 给定机械臂末端要伸到哪，\n\n2. 求达到这个位置每个关节所需的角度，（逆运动学/ik，inverse kinematics）\n\n3. 规划一条路径让机械臂能从当前位置平滑地移动到这个目标位置，同时规避掉途中的障碍物，（轨迹规划，path planning）\n\n4. 设计控制器，让机械臂上的电机输出力矩跟踪这个路径。（dynamics/control）\n\n另外如果末端执行器是夹爪或者灵巧手之类的东西，第一步之前就还有一个计算这个合适的末端位置，好让执行器可以顺利把物体夹住的步骤\n\n逆运动学和轨迹规划这两个相对比较困难的问题可以用moveit这个ros框架轻松秒掉，给定机械臂末端的初末位姿或关节的初末位置，它就可以计算出一条关节位置、速度和加速度的时间序列。最后一个方面，也就是控制是主要需要自己做的工作。\n\n不要用ros2的moveit2，截至2025年10月我写这句话时，humble版本的moveit2开发完成度仍然非常低，缺失很多重要功能，完全不可用（例如文档里写了可以通过一个yaml文件配置求解器参数，但是实际上并不行、ros1 moveit的一大堆求解器到了ros2 moveit2里面只有一两个，ui还有bug）\n\n按直觉来说当然可以用pid直接控，但是如果机械臂比较重（**压力机械，从一开始就别让他画重！！）**，PID就可能解决不了问题（调软了抬不动，调硬了抖），解决这个问题的一种效果比较好的方法是建立机械臂的逆动力学模型，基于这个模型叠加一层动力学前馈（和机械重力补偿效果差不多，25赛季的工程验证了一下这个方法，感觉效果还不错，但是没想象中那么好），或者用lqr、mpc这类控制器（26赛季尝试一下）\n\n## 动力学\n\n基于已经推导出来的运动学结果，用拉格朗日力学可以比较容易的求动力学模型\n\nhttps://github.com/XDU-IRobot/engineer-amorph/blob/main/src/offline/dynamic2.ipynb\n\n## mpc/lqr\n\n这一篇感觉是某位大学生的大作业报告（绷），如果能看懂的话那基本就是手把手教了，跟着做就好\n\n这篇的第二部分 视觉识别不是重点，这里我们只关注怎么控制\n\n&gt; [2209.01706v1-Model Predictive Control Design of a 3-DOF Robot Arm Based on Recognition of Spatial Coordinates.pdf]\n\n这一篇还没看，看懂上面这一篇应该就够用了，但是他应该没考虑在MCU上实时计算的性能问题，得自己想一想\n\n&gt; [Model_Predictive_Control_for_a_2-DOF_Robotic_Arm_Dynamics_and_Control.pdf]\n\n这个非常nb，第二大章节完整的把运动学、动力学建模讲了一遍，把里面的公式抄出来就能用\n\n&gt; [非线性多关节机器人系统滑模控制 (鑳＄洓鏂岃憲, Pdg2Pic, 胡盛斌著) (Z-Library).pdf]\n\n### MPC\n\nMPC本身是一个带约束的优化问题，想要编程实现它就需要用一种具体的求解方法，而且要考虑求解速度，因为控制频率可能是500hz、1000hz，留给计算的时间不多；可以考虑把MPC转化为QP（quadratic programming，二次规划）形式，这样就可以直接利用一些现成的QP求解器（比如qpOASES）来求解。\n\n这个过程中的关键一步就是用具体的离散系统状态空间方程按照MPC的思想把式子列出来，然后变形成QP一般形式。下面这篇文章讲得很详细很明了：\n\nhttps://zhuanlan.zhihu.com/p/498481729?utm_psn=1863281508229464064\n\n## tinympc on stm32\n\n其实tinympc比较好用，速度够快，而且直接把ABQR矩阵扔进去就能算了，还能写python做完仿真之后直接生成c++代码用来部署，真上车的话建议用这个。文档：https://tinympc.org/get-started/examples/\n\n但是这个东西有几个坑，\n\n第一个就是：tinympc是基于系统时不变这一个假设来做性能优化的，这是它能跑在MCU上的很重要的一个前提。因为模型参数不变，所以它可以离线计算一部分东西，最小化要在线计算的内容\n\n在550mhz主频，cache关的STM32H723上，如果扔一个参数不变的，12维状态的四轴无人机系统给他的话，全0初始条件下10000次控制循环的计算时间是3457ms：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NmEwOGYwMzZjOGYwZDUyOGRiZjZhNTdhMjYwNGEzYjdfZjRlNjM4OWQxMDkwODJiOTUxMDE4MjFkOTg0N2YwYmZfSUQ6NzU2MTQ0NDc1MTQyMjE0NDUzMV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n但是如果要追求模型的绝对精准，每个控制周期都做一次线性化的话，那tinympc做的优化就白做了，因为系统模型变了，他离线计算的那些参数现在都要在线算，同样初始条件，同样reference，1000次控制循环的计算时间就达到了1510ms：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NTQ2ODdiMGU2YmYxMzYwMDYxMDVlNDNjNDRiNWI2Y2RfZWQyMzJiYjczZmM5NTZhOWU5MzA4YWRhYThhODNlYjRfSUQ6NzU2MTQ0NTMyOTk0MjUxMTYxOF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n虽然上面的对比条件很理想化，但是其实已经能看出问题了，如果太完美主义，那就会丢掉tinympc的性能优势，所以实际应用的时候其实不得不做一些变通来保证性能，比如只在参考轨迹更新的时候，把轨迹的末端视为平衡点做一次线性化，其余时候都用上一次线型化得到的系统模型控制\n\n第二个：tinympc生成的c++代码会有很多巨大的全局对象，每个对象里都是超级多的Eigen矩阵（如下图），这些东西放在单片机上很容易搞出内存问题，跳进Hardfault handler，所以它生成出来c++代码之后，先把这些全局对象都改成用new创建在堆区里的对象，经实测这样就不会触发内存问题了\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZjYxYjZjMzNlZDc5N2Y5ZWQyNDUyZGRmNTBjY2I3MzZfYmFmMWY0MTU4OTRjMzlkODllOTVmNTM2MmNkOWU4YjFfSUQ6NzU2MTQ0NjkyMzAxOTI4ODU4MF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n## 重力补偿/动力学参数辨识\n\n同构缩小的自定义控制器如果要好用的话，就必须要让他有在没有外力的情况下可以悬停的功能，经过实践证明这个功能会给操作手感带来极大的改善。这种功能是通过逆动力学重力补偿来实现的，为了不额外使用pid来补偿模型误差，最好把模型精度搞的稍微高一点，直接从solidworks里查到的动力学参数经实测达不到要求，只能让机械臂有一种轻飘飘的感觉，还达不到完全零重力飘起来的效果\n\n大概就是这么一种感觉，能感觉到机械臂在抵抗重力，但是抵抗的不是很好：\n\n[2025-10-12 01-16-59.mp4]\n\n25/10/27更新：\n\n上面这个是仿真+2025赛季的实践结论，在实际环境里加上各种摩擦力之后可能稍微有一点不准也是ok的。25赛季为什么这个模型做前馈效果很差，可能是因为当时sw图纸里的质量和质心位置实在和实际情况差的太远导致的\n\n经实测，静态应用下，也就是重力补偿，这个时候不需要知道转动惯量，所以称重+手调质心位置已经很够用了，有一个点需要注意，就是电机转子的质量在称重的时候不好处理，你不可能把电机的转子拆出来称一下多重。对于大机械臂来说，电机转子的质量可能相比于整条link来说只有一点点，所以影响不大。但是在自定义控制器重力补偿这个应用场景下，电机转子可能对于整条link质量来说分量很大，具体怎么消除这个影响，就是凭经验在连杆质量上加一个值来代表电机转子的质量。\n\n比如说对于达妙4310来说，这个值我反复试出来大概是75g左右\n\n如果是要在大机械臂上做动力学前馈，还是最好做一下参数辨识，这样可以把所有物理参数都测出来准确值。\n\n通过参数辨识可以把动力学模型里面的那些m、l、i之类的玩意都测出来很准的精确值，做完之后不仅自定义控制器悬停搞定了，实际装在工程上的那个大机械臂的前馈也会准的多\n\n看一段具体的动力学模型实现（25年工程的，ypp三轴，里面的参数都是从solidworks里直接读）：\n\n```MATLAB\nfunction tau = dynamic_model(q_des)\n\nqd_des = zeros(3, 1);\nqdd_des = zeros(3, 1);\n\n% q1 = q_des(1);\nq2 = q_des(2);\nq3 = q_des(3);\ndq1 = qd_des(1);\ndq2 = qd_des(2);\ndq3 = qd_des(3);\n\nl2 = 0.34;\nl3 = 0.37;\n\nI1 = 0.2473;\nI2 = 0.1246;\nI3 = 0.0402;\n\nm2 = 1.84;\nm3 = 3.46;\n\nr2 = 0.097;\nr3 = 0.150;\n\ng0 = 9.8;\n\na1 = m2*r2*r2 + m3*l2*l2;\na2 = m3*r3*r3;\na3 = m3*r3*l2;\nb1 = (m2*r2 + m3*l2) * g0;\nb2 = m3*r3*g0;\n\nM = [I1 + a1*cos(q2)*cos(q2) + a2*cos(q2+q3)*cos(q2+q3) + 2*a3*cos(q2)*cos(q2+q3), 0,                           0;\n    0,                                                                            I2 + a1 + a2 + 2*a3*cos(q3), a2 + a3*cos(q3);\n    0,                                                                            a2 + a3*cos(q3),             I3 + a2];\n\nM = vpa(M, 4);\n\nN = [-0.5*a1*dq2*sin(2*q2) - 0.5*a2*(dq2+dq3)*sin(2*q2+2*q3) - a3*dq2*sin(2*q2+q3) - a3*dq3*cos(q2)*sin(q2+q3), -0.5*a1*dq1*sin(2*q2) - 0.5*a2*dq1*sin(2*q2 + 2*q3) - a3*dq1*sin(2*q2+q3), -0.5*a1*dq1*sin(2*q2+2*q3) - a3*dq1*cos(q2)*sin(q2+q3);\n    0.5*a1*dq1*sin(2*q2) + 0.5*a2*dq1*sin(2*q2 + 2*q3) + a3*dq1*sin(2*q2+q3),                                  -a3*dq3*sin(q3),                                                           -a3*(dq2+dq3)*sin(q3);\n    0.5*a1*dq1*sin(2*q2+2*q3) + a3*dq1*cos(q2)*sin(q2+q3),                                                     -a3*dq2*sin(q3),                                                           0];\n\nN = vpa(N, 4);\n\ng = [0;\n    b1*cos(q2) + b2*cos(q2+q3);\n    b2*cos(q2 + q3)];\n\ng = vpa(g, 4);\n\ntau = M * qdd_des + N * qd_des + g;\ntau = double(transpose(tau));\n```\n\n对于自定义控制器来说，由于要做的只是“静止状态下的”“重力”补偿，所以动力学模型其实变成了一个“静力学”模型，那一大串东西可以简化为$tau=g$，而从上面可以看到g向量只和b1、b2两个参数有关，那就只需要让机械臂静止在不同的位置，把关节位置和关节实际输出力矩记录下来做个最小二乘就好了（重力向量方程整理之后可以表示为$tau=F(q)cdot\n[begin{array}{c}\nb1 \nb2\nend{array}]$，b1b2向量叫待辨识参数集，一般记为$pi$，q知道，tau知道，tau等于g，所以b1和b2可以算出来）\n\n用仿真示意一下，要做的就是给pitch1 pitch2两个关节位置输入随机序列，采很多组力矩数据：\n\n[2025-10-12 01-59-07.mp4]\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ODE0MWE0NWM5MDhjN2I3ZTM2M2QwZWMyMzdhMjA3NjFfZTcxZjZiNTA5OGQxMjg4NTc0MDg1YWY1ZmU2Yjk1OWRfSUQ6NzU2MDAyNTQ0MzYwMjEwNDMyMV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n如果想要把所有参数，包括和惯性有关的那些东西都弄的很准用来做大机械臂的前馈，就要让机械臂动起来，然后记录他动的时候的加速度、速度、位置和实际输出力矩，要算的参数集也就包括 MN矩阵里面的那些，不光是g向量了。\n\n让机械臂怎么动辨识结果才能最好也有一些门道，这个叫激励轨迹设计，网上资料很多\n\n下面是做最小二乘用的代码（AI写的）：\n\n```MATLAB\nfunction pi_identified = identify_gravity_parameters(experimental_data)\n    % experimental_data: N x 6矩阵 [q1, q2, q3, tau1, tau2, tau3]\n    \n    N = size(experimental_data, 1);\n    T = zeros(3*N, 1);\n    W = zeros(3*N, 2);\n    \n    for i = 1:N\n        q2 = experimental_data(i, 2);\n        q3 = experimental_data(i, 3);\n        tau = experimental_data(i, 4:6)&#39;;\n        \n        % 回归矩阵（只包含重力项）\n        Y = [0, 0;\n             cos(q2), cos(q2+q3);\n             0, cos(q2+q3)];\n        \n        T(3*i-2:3*i) = tau;\n        W(3*i-2:3*i, :) = Y;\n    end\n    \n    % 最小二乘估计\n    pi_gravity = (W&#39; * W)  (W&#39; * T);\n    \n    % 提取b1, b2\n    b1_identified = pi_gravity(1);\n    b2_identified = pi_gravity(2);\n    \n    pi_identified = [b1_identified; b2_identified];\nend\n```\n\n上面的东西做完之后，如果发现对基座倾斜的鲁棒性不好，就要考虑：上面模型里面的重力向量是固定竖直向下的，所以还要在基座上装一个imu，用imu算出来的基座姿态对重力向量做修正，直接用基座系到世界系的旋转矩阵和重力向量相乘，把重力向量转到正确的方向上即可\n\ng0_base = R_base * g0_world\n\n但是这个，说实话实测下来影响没有那么大，如果稍微歪一点点重力补偿都会失效的话那就要考虑是不是模型参数有问题，而不是做这个东西。\n\n1. 做完重力补偿之后，如果觉得手感滑可以加个阻尼器。\n\n2. 后面三个关节很轻，用不着用动力学模型做重力补偿，调一个硬一点的阻尼就够稳住了。\n\n下面是重力补偿做出来的效果（只有两个大pitch关节）：\n\n[IMG_5664.MOV]\n\n### 摩擦补偿\n\nhttps://zhuanlan.zhihu.com/p/338637547?share_code=uL1V69Zup1gT&amp;utm_psn=2003873069815584395\n\n## 自定义控制器力反馈\n\n[j.tbit1001-0645.2025.070.pdf]\n\n## 运动学\n\nhttps://zgzhou.notion.site/PUMA560-a116cd9695d349aa9f338081f013a2a4\n\n运动学分为正解（给关节角度求末端位置）和逆解（给末端位置求关节角度）。这里主要记录一下逆解的思路\n\n逆解算法分为迭代优化求数值解（https://zhuanlan.zhihu.com/p/1889447970438632548）和几何法求解析解两大类，解析解更稳定且开销小，但根据构型不同，机械臂不一定有解析解，关于怎么判断一种6dof串联构型有没有解析解可以遵循两条原则（pieper准则）：\n\n1. 三个连续的转动关节的轴相交于同一点\n\n2. 三个连续的转动关节的轴平行\n\n这两年RM比赛流行的六轴臂一般都是这种PUMA560构型（yaw pitch pitch roll pitch roll），具有解析解，且多解情况只有两种，比较简单：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OGViNWI1YzM4ODVkOGM3NjViN2QwNzhhYTZlZWRhZWFfY2VhYjI2OGViNDg3NTM4YTgxMDcyOTc5NmQxMTkyMzVfSUQ6NzYxOTc4MDEyODUyNDAxMjc2Nl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n求这种构型的逆运动学的思路是“先定位再定姿”，分析一下可以发现，末端工具的位置只由前三个关节角度决定，用前三个关节把工具放到想要的位置之后，再用后三个关节调整工具的朝向。\n\n第一个大yaw轴的角度很好确定，从上往下看：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OGYwZWEwM2ZkNmZmMDQ3ZjVkZTIzYjVkYzM5MjNhZDBfMGYzNDA2OWE0OWQ1N2E1MTBmNWJiMmU0OGNkNDdjMjVfSUQ6NzYxOTc4MjcwOTEwMzEzNTY4OF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n$theta$就是$atan2(x, y)$\n\n第二、第三个pitch关节也很好确定，从侧面看：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NDEyYjIxNzJkZDhhNWQzN2E5NzRhY2EzZDA0OTgyYmFfMmQyNDYzMjgxMjJjM2M0OWVkMzY1ZGNjYmIzNDQwMGNfSUQ6NzYzODgwMzQ3NjE1NTgyOTIxN18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n臂长$l1$、$l2$已知，虚拟杆长$l3$也已知（j2、end两点间的距离），求两个角度，这是一个解三角形问题，用几何方法算出q2和q3即可\n\n这里涉及到多解问题：elbow-up和elbow-down两种情况，都可以使末端执行器到达相同的位置。特征也比较明显，就是q2是正数还是负数。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YjBlOTNhMzg3MmU3OThkYmVjOTJkNTlhNmRlODAxMTJfMmU3YzRiYzhjZTUxN2EzM2Y3Y2ZmNDY0YmMwOTA2MDNfSUQ6NzYzODgwNDQ3NzQxNTkxODU2Ml8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n前三轴定位，后三轴定姿。末端三关节的轴线交于一点，所以可以把末端的三个关节抽象成安装在这个交点处的roll-pitch-roll万向节。给定末端执行器的姿态，求关节角，本质是分解合成这个旋转的一个ZYZ欧拉角，相关内容在机器人学导论的一开始就有提到，直接去看书就可以，这里不再赘述\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MjExZTc5ODg3YjQzOWEwNDdmOTI1NjY4N2RiZGY4ZjFfMDRjODEzNTg4OWU3N2I0ZWYyNzYzYzM2MzBkYmQ2NjdfSUQ6NzYzODgwMjA0OTkwMzQxNDI0Ml8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n我们关心的是末端工具（夹爪或吸盘）的位姿，而不是这个虚拟球腕的位姿，所以还要处理tool offset：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=M2YzMzA2Yjk2MDZkNDY2NDgwODU4ZGVjYWQ0ZmY3NDhfYjBlZGVhOWZlMjUwNjViNjhkZWFhNDliMzVlNzE3MWVfSUQ6NzYzODgwOTA3OTU1NzY3MTkwN18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n## 输入整形（残留震动抑制）\n\nhttps://zhuanlan.zhihu.com/p/402291172?share_code=fwwyvmlMo14s&amp;utm_psn=2047255562614740908\n\n## 手眼标定\n\n机械上总会有些装配误差，你在图纸里看的相机和手的相对位置实际上可能并不是这么回事，所以多了这一步\n\n如果相机装在机械臂以外，叫手在眼外，反之叫手在眼内。\n\n眼在手外标定是这么回事（那个神秘玩意是标定板，可以是棋盘格子可以是apriltag，只要能通过图像算出他的姿态就可以。末端相对底座的位姿是正运动学算出来的）：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YTE1MzhkYTNjZjkzZDk5OGU1ZDI5OTdmZDVlNDJlOWNfNWJlOTdhODYzNGViNjQxZjRkN2NkMDViNTNiNjQ3YTdfSUQ6NzU3NjcwNTEyMTU2OTIxMzYyNV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n眼在手上标定是这么回事：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NWUyYjIxMTg0MGU4NmI3NTRhNWMyOWQzMTA2ODZhZTZfNjc4NjNiOTgzMWU3Y2M1NjkzOTJkNTE3ODMzN2FlYThfSUQ6NzU3NjcwNTY3NjczMTI4ODc5NV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n本质上他们都是一个解AX=XB这两个齐次变换里面的那个X，想细嗦网上有很多资料，但是建议别细嗦，opencv里面有一个calibrateHandEye函数，直接一行搞定\n\n### 用easy_handeye2进行手眼标定\n\n已经有人基于opencv和ros2造好了这些轮子，直接用就可以\n\nhttps://github.com/marcoesposito1988/easy_handeye2\n\n1. 首先标定相机内参，后面定位apriltag会用到，一般d435、g336l这种相机都是出厂标定好的，如果不是的话自己参考这篇文章标一下：https://zhuanlan.zhihu.com/p/488925991\n\n2. 在机械臂上贴一个apriltag，然后在urdf上相应位置打一个坐标系\n\n（好像不用？easy_handeye文档里面说的我没看懂是啥意思（见下图），我不想后面出问题所以还是打了）\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MGE3OTI0ZDI0OTBlZWRmMjYzMmY5NmMwM2ZmYjY3MThfMDAyMDhkZTcxMzQwOTI0ZjIzMjFiNTcyZThiMTg3ZThfSUQ6NzU5MDQzMTgzNzM4MjU2MDcyMl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OTYyMGNjM2QxZDg4OWYwZjVhNzNhOWZhZDhiMjlhMGVfZWRlOTIzODNiNjA3ZGRjNTAwOTg3Y2YxZWFhYTZkYjVfSUQ6NzU5MDM5NjY4ODM2MDA2NTk4MF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZmEwNWMzZjk5NTA3NzJlZTA0MWVhODk5MDk4MDMzYTBfMjA5OGFhOWNjMTgxNzcyM2M1NzFmMjhjNDY2Yzk4NjhfSUQ6NzU5MDM5Njc1Njc5NDMzMDA0Ml8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n3. 写好上下位机通信，模仿`joint_state_publisher`节点的方式，把机械臂的关节位置发到`/joint_states`话题上，大概10~20hz频率就够：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OWFkODE1MWVhOGM5ZmFlN2M1ODk2NDM5ZDA0OTU4YjJfMTliYmE4OTJiMDc5M2YxYjRkNjlkZjcyMzIxNTgyYmZfSUQ6NzU5MDM5NzIwMjQ3NzAwOTg4Nl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NmQ1Y2MyNjBlOGQ1ZTRiZWRjNDdiMWMzMjQ4NmQ3YTlfMzIxNWRmZDUzNGFkMDJhNzVlZDY0Njc1MDU1NjdiODZfSUQ6NzU5MDM5NzMxMjI2Njk0NzUyNl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n4. 启动robot_state_publisher节点和moveit的move_group节点，关节位置会自动被转发到tf上面。\n\n5. 启动apriltag定位节点，可以自己写，也可以直接用`apriltag_ros`这个包(`sudo apt install ros-jazzy-apriltag`)，自己写一写逻辑，把相机系-&gt;tag系的变换发出来：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MDVlNjAxNGI3ZDBkMTU5MmU3YjY0MTBkNWVlYWUxZWFfMzhkMWM2NTIwNGZiMTNmZTY2YWFkZWJmMDcwOTE5MDlfSUQ6NzU5MDM5ODA2ODMxNTQ3NTE0NV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n6. 写easy_handeye2的启动文件：\n\n    ```xml\n    &lt;?xml version=\&quot;1.0\&quot; encoding=\&quot;UTF-8\&quot;?&gt;\n    &lt;launch&gt;\n      &lt;include file=\&quot;$(find-pkg-share easy_handeye2)/launch/calibrate.launch.py\&quot;&gt;\n        &lt;arg name=\&quot;calibration_type\&quot; value=\&quot;eye_on_base\&quot;/&gt;\n        &lt;arg name=\&quot;name\&quot; value=\&quot;my_eob_calib\&quot;/&gt;\n    \n        &lt;arg name=\&quot;robot_base_frame\&quot; value=\&quot;arm_base\&quot;/&gt;\n        &lt;arg name=\&quot;robot_effector_frame\&quot; value=\&quot;apriltag_link\&quot;/&gt;\n        &lt;arg name=\&quot;tracking_base_frame\&quot; value=\&quot;camera_link\&quot;/&gt;\n        &lt;arg name=\&quot;tracking_marker_frame\&quot; value=\&quot;tag_0\&quot;/&gt;\n      &lt;/include&gt;\n    \n      &lt;include file=\&quot;$(find-pkg-share amorph_bringup)/launch/apriltag.launch.py\&quot;/&gt;\n    &lt;/launch&gt;\n    ```\n\n设置好里面的四个frame：\n\n- `robot_base_frame`：机械臂底座坐标系\n\n- `robot_effector_frame`：文档里说填末端工具系，但是我没试过，这里填urdf里面的tag系\n\n- `tracking_base_frame`：相机的rgb光心系（注意不是camera_link！）\n\n- `tracking_marker_frame`：apriltag识别节点识别到的tag系\n\n可以像上面一样顺便把apriltag的识别节点开起来。\n\n7. 上述准备工作全部完成之后，启动机械臂驱动、move_group、apriltag识别节点，最后启动这个手眼标定的launch文件。稍等一会会弹出一个窗口：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ODQxZjIxNDdhZTUxMDkzMjM0ODc5OGM1ZDNlZDFjMjNfNDcxODE4ODZkMGZmMTk2OWQ5YjMyZmNmYWQ0MDRkMjZfSUQ6NzU5MDM5OTI2MTgwMDQzNDY0N18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n8. 保持相机可以稳定识别到apriltag，把机械臂四处动一动，动到一个地方点一下`Take Sample`，动的幅度要尽量大，采的数据点数要尽量多，最少20个点，最后Result会稳定下来，这个就是手眼标定结果，直接把这个作为`arm_base`-&gt;`camera`的静态变换发出来即可：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ODU3OWIzNWI5MTQ5YTM5ZDAwN2U3ZWE4NDdiYWFmZTlfMWNhOGNlOTk2YTQ1MWY3NjM2YmE5Y2M5OGUyZGE0YTlfSUQ6NzU5MDQwMDExMDU1OTc3NTY5OF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n9. 完成之后在rviz里面看一下效果，rviz渲染的机械臂模型和实际拍到的机械臂重合的怎么样，根据实践经验，在我用这个7×7cm的apriltag的情况下，这个结果一般会有一些偏差：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YzgwZjE1M2JkYjQwMzM5YzczNmMwOGI5OWZjY2U3MTlfOWZlOTIxMjljZDFkMzA2YWVjNWQ3NjRmNGZlZDM2MGVfSUQ6NzU5MDQwMDQzMDgyNDMyODE0M18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n可以看深度相机点云、图像手动微调，尽量调到完全重合：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=Mzg1MWQzMzNjYmEzYmZhN2E2MmE4YTdjM2FiNGE2MWZfNjBlZDYwZGZkNWY1MWE3Y2Y1Yjg3MTFjNGYwYTk4OWFfSUQ6NzYxNzE5MDQzMTA0MTg4MzM1NV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n## 视觉\n\n### 深度相机选型\n\n这方面上交在25赛季结束之后有分享过经验：\n\nhttps://www.bilibili.com/video/BV1LQn2zoEAm\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YzA0MjA3YjNjN2M3ZWFlN2Y5OTQxYWUzNzJhYzFhZGJfMzFiNTI4YjQ3MTgxN2E4NmRkYzY3NGViN2E5NzYyZWJfSUQ6NzU5MDQ0MDE3NzgzMTU0NTgwMF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n总的来说，虽然当下行业里用的基本都是双目结构光相机（低成本+够用），但是机械臂视觉这种极度要求高精度的场景，tof是绝对比双目结构光效果要好的，上图里提到的奥比中光Femto Bolt就很不错，Realsense L515也不错（性能可以但是产品很旧，SDK不支持新版ubuntu系统），但是受财力限制，买不起。。。所以就退而求其次用队里有的d435，很幸运，关超自己有一个奥比中光Gemini 336L，后面借来用了，虽然也是双目结构光，但是因为产品比较新所以效果比d435好了不少。\n\n### 炼丹数据哪里来1之x-anylabeling\n\nhttps://github.com/CVHub520/X-AnyLabeling\n\n这个标注软件支持用SAM辅助标segment数据集，效率非常高，还可以练定位，标完50000张应该可以颗秒donk了\n\n[6910.mp4]\n\n### 炼丹数据哪里来2之blenderproc合成实例分割数据\n\n这个东西的功能基本就是用脚本操作blender，我的做法是在blender里搭一个场景，然后给一个物体模型，随机采样物体姿态和相机姿态，然后它就可以批量生产这个物体模型在这个场景里的各种数据集，实例分割、检测、6d位姿等等都可以搞，而且出来的就是ground truth，数据质量无敌，这基本上等于左脚踩右脚上天，拥有无限的数据来炼丹了：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=Y2Q2OGI3NzhmNzRiNzVlY2NkZmY5MWNiNDBiMzBiMDNfMzExZmY1ZmRlMzBhZTFiZTU0NWE1NDBjYzY2Yjk3NDVfSUQ6NzU3MDcyMjEwMDkyODM0ODE2NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YzA3ZGUxNjY2MTU3MmFmZTExODJkZmQwNDI2NzJiOGRfZjNjZmNhYmYzZjM1YjQ3YjgzNjQ4OTM4OTE0MDIzMmFfSUQ6NzU3MDcxNTI0ODY5MzU5MjA2N18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MjQ0NDljZmEzNWM4YzY3YmQ0MmE0NzU1ZDdkZmIzYjRfZWQ5MDEwOGJlMWJkNDRmMjYzMTFkZThiMWI0NGI4M2NfSUQ6NzU3MDcyMjk0MzkzODI5Nzg1OF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n### 炼丹技巧\n\n用上面的方法做完数据集之后，就可以开始选一个模型开炼了，我选的是yolo11m-seg。网上有很多炼丹的技巧分享，结合我自己的经验的话就是：\n\n1. 总量控制在20000~30000张图左右，少了效果不行，多了训练时间太久不好迭代\n\n2. 合成数据和实拍数据混在一起，不要单独用\n\n3. 加一些负样本，比如弄一个红色的能量单元\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YWJiZWVmNTc1NTg4ZGU5ODE2MGMyZjI1YzQyZTU4NjBfOTdmZGU3M2RjMDNhODlkOTYzYjEwZTBjOWQzZWUzNTdfSUQ6NzU5MDQyOTkwNDU0NjY2MzY0NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n4. 模型在哪用，数据就在哪采，场上拍的数据集最优\n\n5. 如果做不到第4点，场景一定要尽量多变化，不要连着2k~3k张图都是在同一个地方拍的\n\n6. 能加的数据增强都加上，ultralytics都帮你写好了\n\n连着一个周拿着相机到处拍，然后回来标数据集，晚上下班之前炼一轮，燃尽了。。\n\n虽然最后模型的泛化还是不行，但是在实验室里效果还是非常ok的（大部分视频都是在实验室里拍的，这是我上面第4点总结的依据）\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OTZjOWZiYWNiMGM5ZTUyOTc5OGU1MmNiNDVkOTg3MjFfNDliZDA4NjJjODBkMzEyMmQzMmZiNDY3NmRmZjY3NjRfSUQ6NzU5MDQzMDU1NjgzODA1NDg1N18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n### 能量单元的6d位姿估计\n\n拿到能量单元的mask之后，接下来就要开始考虑怎么做6d位姿估计。\n\n首先我做了一个第一版demo，只定位，不考虑姿态。这个很简单，把mask的最中间一小块抠出来，深度过一个中位数滤波就好了，实测下来效果非常好：\n\n[20260101-235921.mp4]\n\n接下来处理旋转，首先我想到了slam里面常用的一些点云配准方法，icp、ransac这些，但是实测下来这种算法根本一点都用不了，估计的位姿完全乱飞，很可能是因为深度相机能拍到的就只有面向相机的那一点点，而且能量单元还是对称的：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OWZkNGJmM2I2ZTljNDAwMDE0ODU5MWI3NTliNTFkODdfNmJjNjk5Mzc3NjJjM2M3ZTlmZTY1ODI0NTIyZWRkMDhfSUQ6NzU5MDQyMTI5Njg3ODUwNTE1NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NjZiYzJlMGM5MmI4NTFiNTRmZTcwYmIwMGJhZWEzMDZfODU0N2VjODE4ZDBlZWFlYmExZjk3MWNmM2MxYjc0NWVfSUQ6NzU5MDQyMTM4MzQzMjEyOTUwNF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MTQ4OTYyOTI4MzZjNTczNzY5MDgyMmVmMGEwNzM2OThfZWY3NDA0YmRkZjM5NjVhODEzYTQ1MjdkNDk3NDU2NjRfSUQ6NzU5MDQyMTUwOTczMTA2MDkyMl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n这种比较泛用的算法不行，那就考虑能量单元本身的特征，然后针对性的做一个算法，毕竟这个比赛也不会让你识别别的东西，我接下来的思路是，这是一个分三段的圆柱，点云里面也大概能看出有一点点圆柱面的样子，那就试试用PCA拟合一个圆柱面的主轴方向，结合第一版demo里面很稳的位置估计方法，出来的结果意外的还不错：\n\n[2025-12-31_15-28-24.mp4]\n\n接下来做几步几何运算，把坐标原点移到能量单元的底部中心，方便后续处理：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZTBkODgzNzc1Mzk5NTk2NTQ2YWFlZTRiNjMyZjYzOWFfNjgzN2Q0NDFiYjVlODU1Mzg0NTBiNDdkMzAxYTA2OGNfSUQ6NzYxNzE4ODU5NjgwMTM0MjY1Ml8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NDNlNjVhMDFjYTMwYmVhMzkyZjcyMWQ0YmY2ODZlZDVfNTFiZmZjMjE5YzY0YTkzYzczZDk2ZDBlMDViYTliYWFfSUQ6NzYxNzE4ODk0NjU3Mjc1Nzk1NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n## moveit\n\n记录一些和moveit2这个半成品项目大战 ~~1~~ 2 年摸索出的一些心得\n\n### python binding\n\nhttps://picknik.ai/moveit/ros/python/google/2023/04/28/GSOC-MoveIt-2-Python-Bindings.html\n\n### 把机械臂模型导入moveit\n\n网上的moveit教程好像都是默认已经有了urdf模型，几乎找不到一步步从solidworks到最终导入moveit的教程，所以这里详细介绍一下整个过程\n\n#### 从sw里导出urdf\n\n首先给solidworks装上sw2urdf插件：https://github.com/ros/solidworks_urdf_exporter\n\n在solidworks里面首先做一些处理，这个模型只需要能表示机械臂的外形即可，内部不会影响整个外部轮廓的的传动结构、电机电调等等东西建议都删掉或者压缩掉，这些东西不仅会增加模型复杂度，还可能导致一些意想不到的干涉影响moveit的碰撞检测。限位机构可以保留。\n\n把机械臂摆到你定义的零位，然后每个关节上建一个点、一个轴、一个坐标系，为了后续方便处理，以每个关节的转轴为Z轴：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NzM5YmNhMjU2MDVlYjk3YjU2MDgyNzljYjE4ZmQ3NzFfYTVjOGI0YzNiMDZlZTFlZDY3MDRkODBjYzQwNDk1NmJfSUQ6NzYwNDA0NTE5MDY1NTExODI5Nl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n然后给整个机械臂建一个参考原点，坐标系定义按REP105来（https://www.ros.org/reps/rep-0105.html）（前+X，左+Y，上+Z）：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=Nzc1YzkzMDRkNjk1YjM4NGNkYTBjYzQwMzU0ZDcxZWZfYmZhZjA2Zjc5MWNlZGMzNjQ0OGMwODY5NTgxZjJlNDZfSUQ6NzYwNDA1MjI3ODkzNDA5NzA4NV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n设好之后，工具-&gt;Tools-&gt;Export as URDF：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MWU3ZWM2OGVjZTY5ZGVjZjYyN2ZjMjcxNGM5MGUyMDFfMzA2NjI2NjZlYWU0YzJiMzJmM2JkZTUzYWYyZjFkOGVfSUQ6NzYwNDA0NTY1NzQzMzA4MzEwNV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n在左边一个关节一个关节的搭建urdf的树形结构，填写link名称、joint名称，坐标系和轴选刚刚第一步建好的对应的即可，Joint Type按实际情况选择，带限位的旋转关节选revolute，可以无限旋转的旋转关节选continuous，平动关节（比如夹爪的指头）选prismatic，最后把这个link包含的零件选上：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZDU1MDBkYzZhYjc2NjAyYzliNmJlMTlmZDRlZmUzNzBfZDIzY2NiZDU2Mzg0NTk0YjkzODRmMzc2NDUxZjBhMThfSUQ6NzYwNDA1MDQyMzg1NDgxMjM4Nl8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n搭好之后点Preview and Export（不要点对钩），在弹出的窗口里给每个revolute joint设置限位，由于现在不太好想象每个轴的旋转方向，所以可以先填一个-pi~pi，然后待会导出之后再看着rviz调整，力矩和速度限制随便填一下即可：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MDA3MDY1YmI0NDE4MzY3ZjI1ODg5MzgzY2U0OGFhYzBfMWZiNWE1MzIwNDY4ZjdiMzc5MDE5ODdkNjZiMWY3ZWJfSUQ6NzYwNDA1NDI1NDA2MzYwMjYyN18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n注意夹爪的两个指头有联动关系，这里设置gripper_r为mimic joint，mimic对象为gripper_l，因为两根指头的移动方向总是相反的，所以multiplier填-1：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MDc4ZGVkNWVlMTIyNjE0MDY5OTI1YjVkN2UyNGYwZTVfYWFlMGNiZTM1MDJmZDVjNjVhOWJiZmM5Y2ZiMTZhOTdfSUQ6NzYwNDA1NDY0NjAzODA4ODY1M18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n点next、Export URDF and Meshes直接导出，选保存位置，文件名就是导出的ROS package的名字，按惯例这里填xxx_description，xxx是机器人的名字：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZmYyZmEwYjg1NTk3NmNkNGQ4M2JkMDQxMzg1YjFiZGZfYmI1NDhmZTMzZTk2NTgyMTI2MzU2MjliM2VlZmUyM2VfSUQ6NzYwNDA3MzE1NTc1MzM0ODA1NV8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n#### 改造成ROS2可以用的格式\n\n导出完如果是ROS1就可以直接编译出来用了，ROS2需要改造一下才能用。\n\n1. 把package.xml和CMakeLists.txt改成ROS2的格式：\n\n```xml\n&lt;?xml version=\&quot;1.0\&quot;?&gt;\n&lt;?xml-model href=\&quot;http://download.ros.org/schema/package_format3.xsd\&quot; schematypens=\&quot;http://www.w3.org/2001/XMLSchema\&quot;?&gt;\n&lt;package format=\&quot;3\&quot;&gt;\n  &lt;name&gt;amorph_arm_v2_description&lt;/name&gt;\n  &lt;version&gt;0.0.0&lt;/version&gt;\n  &lt;description&gt;amorph_arm_v2_description&lt;/description&gt;\n  &lt;maintainer email=\&quot;messenger@lunariio.work\&quot;&gt;lunarifish&lt;/maintainer&gt;\n  &lt;license&gt;MIT&lt;/license&gt;\n\n  &lt;buildtool_depend&gt;ament_cmake&lt;/buildtool_depend&gt;\n\n  &lt;exec_depend&gt;joint_state_publisher_gui&lt;/exec_depend&gt;\n  &lt;exec_depend&gt;hardware_interface&lt;/exec_depend&gt;\n  &lt;exec_depend&gt;robot_state_publisher&lt;/exec_depend&gt;\n  &lt;exec_depend&gt;rviz2&lt;/exec_depend&gt;\n  &lt;exec_depend&gt;xacro&lt;/exec_depend&gt;\n\n  &lt;test_depend&gt;ament_lint_auto&lt;/test_depend&gt;\n  &lt;test_depend&gt;ament_lint_common&lt;/test_depend&gt;\n\n  &lt;export&gt;\n    &lt;build_type&gt;ament_cmake&lt;/build_type&gt;\n  &lt;/export&gt;\n&lt;/package&gt;\n```\n\n```cmake\ncmake_minimum_required(VERSION 3.11)\nproject(amorph_arm_v2_description)\n\nfind_package(ament_cmake REQUIRED)\n\ninstall(\n  DIRECTORY config launch meshes urdf\n  DESTINATION share/${PROJECT_NAME}\n)\n\nament_package()\n```\n\n2. launch文件夹里有两个ROS1的launch文件，改成一个启动rviz2显示机器人模型的ROS2格式的launch文件：\n\n```python\nimport os\n\nfrom launch import LaunchDescription\nfrom launch.actions import DeclareLaunchArgument\nfrom launch.conditions import IfCondition\nfrom launch.substitutions import Command, FindExecutable, PathJoinSubstitution, LaunchConfiguration\n\nfrom launch_ros.actions import Node\nfrom launch_ros.substitutions import FindPackageShare\n\nfrom ament_index_python.packages import get_package_share_directory\n\ndef generate_launch_description():\n    declared_arguments = []\n\n    declared_arguments.append(\n        DeclareLaunchArgument(\n            \&quot;description_package\&quot;,\n            default_value=\&quot;amorph_arm_v2_description\&quot;,\n            description=\&quot;Description package with robot URDF/xacro files. Usually the argument \n        is not set, it enables use of a custom description.\&quot;,\n        )\n    )\n    declared_arguments.append(\n        DeclareLaunchArgument(\n            \&quot;description_file\&quot;,\n            default_value=\&quot;amorph.urdf.xacro\&quot;,\n            description=\&quot;URDF/XACRO description file with the robot.\&quot;,\n        )\n    )\n\n    declared_arguments.append(\n        DeclareLaunchArgument(\n            \&quot;gui\&quot;,\n            default_value=\&quot;true\&quot;,\n            description=\&quot;Start Rviz2 and Joint State Publisher gui automatically \n        with this launch file.\&quot;,\n        )\n    )\n\n    description_package = LaunchConfiguration(\&quot;description_package\&quot;)\n    description_file = LaunchConfiguration(\&quot;description_file\&quot;)\n    gui = LaunchConfiguration(\&quot;gui\&quot;)\n    \n    package_share_directory = get_package_share_directory(\n        \&quot;amorph_arm_v2_description\&quot;)\n    ## rviz_config_file = os.path.join(package_share_directory, \&quot;rviz\&quot;, \&quot;default.rviz\&quot;)\n\n    robot_description_content = Command(\n        [\n            PathJoinSubstitution([FindExecutable(name=\&quot;xacro\&quot;)]),\n            \&quot; \&quot;,\n            PathJoinSubstitution(\n                [FindPackageShare(description_package),\n                 \&quot;urdf\&quot;, description_file]\n            ),\n        ]\n    )\n    robot_description = {\&quot;robot_description\&quot;: robot_description_content}\n\n    joint_state_publisher_node = Node(\n        package=\&quot;joint_state_publisher_gui\&quot;,\n        executable=\&quot;joint_state_publisher_gui\&quot;,\n        condition=IfCondition(gui),\n    )\n    robot_state_publisher_node = Node(\n        package=\&quot;robot_state_publisher\&quot;,\n        executable=\&quot;robot_state_publisher\&quot;,\n        output=\&quot;both\&quot;,\n        parameters=[robot_description],\n    )\n    rviz_node = Node(\n        package=\&quot;rviz2\&quot;,\n        executable=\&quot;rviz2\&quot;,\n        name=\&quot;rviz2\&quot;,\n        output=\&quot;log\&quot;,\n        condition=IfCondition(gui),\n        ## arguments=[\&quot;-d\&quot;, rviz_config_file],\n    )\n\n    nodes = [\n        joint_state_publisher_node,\n        robot_state_publisher_node,\n        rviz_node,\n    ]\n\n    ## Launch!\n    return LaunchDescription(declared_arguments + nodes)\n```\n\n3. 把urdf模型改成一个xacro模型。在urdf的\\&lt;robot\\&gt;标签里加一行（xmlns那一行）：\n\n```xml\n&lt;robot\n  xmlns:xacro=\&quot;http://www.ros.org/wiki/xacro\&quot;\n  name=\&quot;amorph_arm_v2_description\&quot;&gt;\n```\n\n然后把这个xxx.urdf文件名改成xxx.urdf.xacro。\n\n新建一个xxx.xacro文件引用这个urdf.xacro文件：\n\n```xml\n&lt;?xml version=\&quot;1.0\&quot;?&gt;\n&lt;robot xmlns:xacro=\&quot;http://www.ros.org/wiki/xacro\&quot; name=\&quot;amorph\&quot;&gt;\n  &lt;xacro:arg name=\&quot;use_mock_hardware\&quot; default=\&quot;false\&quot; /&gt;\n\n  &lt;!-- base urdf --&gt;\n  &lt;xacro:include filename=\&quot;$(find amorph_arm_v2_description)/urdf/amorph_arm_v2_description.urdf.xacro\&quot; /&gt;\n\n&lt;/robot&gt;\n```\n\n4. 完成上面三项改动之后文件结构如下：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZjU2NjE1MTMyNjdiM2U1MmMxYWQ3NjM0NGNhMTIyNWZfOThlZDkxYzE1NWM5NTAwNjMyNGNhMjgyNzA1ZTllNzZfSUQ6NzYwNDA4MTAyNDU1NzA5MjAzOF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n这个包应该已经能在ROS2下编译运行了，`colcon build`之后运行`ros2 launch xxx_description display.launch.py`，打开rviz之后添加一个RobotModel模块，配置一下根坐标系和话题应该就能看到机器人模型了，并且旁边还有一个joint_state_publisher_gui窗口可以传动机器人的各个关节，这个时候就可以一边转一边调整urdf文件里的关节限位还有转向定义。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NjQwMTkzNWZiMTdhZjZjYTc5NjBhMGJkZTU4MGNlYjhfMGM5NDFiNDRhNDRjOGMzMjhhNzhkZmZlZmU0YjBkNzFfSUQ6NzYwNDA3OTk5Mzc2ODkyMjA2NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n#### 创建moveit配置包\n\n首先需要安装moveit，图方便可以把所有名字是moveit开头的包全装上：\n\n```bash\nsudo apt update\nsudo apt install ros-$ROS_DISTRO-moveit*\n```\n\n然后安装TRAC-IK，这是一个性能比默认选项KDL要好的运动学求解器：\n\n```bash\nsudo apt install ros-jazzy-trac-ik\n```\n\n之后的内容参考官方文档一步步进行即可：https://moveit.picknik.ai/main/doc/examples/setup_assistant/setup_assistant_tutorial.html\n\n途中选择运动学求解器时选TRAC-IK，路径规划算法选RRTConnect，RRTConnect是综合应用场景和性能最好的一种算法（参考：https://planner-arena.kavrakilab.rice.edu/），夹爪group这两项都选None，因为夹爪不需要求解器，只有两个固定命令，open和close：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ODVjMDIyY2MyNTJkM2RhYzJjYTIzZjVhNjA1MmRmNzZfYzljYTA4MmNhY2M1YTIwYzExMzY2NTk2MjY4ZDM0NTNfSUQ6NzYwNDA4Mzg2OTE4MDAwNTMwOF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n另外要给夹爪设定open和close两个状态时的关节位置，设这个可以稍微随意一点，主要是要有这两个状态定义在srdf文件里：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZTllZTk3ZGQ1MjlkNWY0MjIwNDljYmU0YTAyNjdhNzVfODdmY2YzYjlhNGIxN2JkNjM5OTExYzI4ZGY1YTI0MTBfSUQ6NzYwNDA4NTU1NzU0Njg3OTk2NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MjAwMzQ4NmIxNzg1N2U0ZWU4ZTlkYWRhYTFjMzUyNTRfN2EzYjdhNDdlNjliMmE0MzgyMzNlOTllOTU1OWZkM2ZfSUQ6NzYwNDA4NTM4NjgzODc3Mjk1N18xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n### 写action server\n\n规划完路径之后就需要把轨迹下发给机械臂执行，第一种方案是把轨迹从moveit里面取出来，然后后面想干什么干什么，第二种方案是把机械臂用Action server的方式接入moveit，这种方式更好，因为moveit在执行轨迹时会做一些检查，比如机械臂当前位置和规划的轨迹初位置是否重合之类的\n\n另外有一点很重要，就是MTC并没有让你把规划好的轨迹取出来的接口，如果要执行规划出来的task，就只能走action server，所以建议直接选第二种方案。\n\n具体一点说的话，就是在创建moveit config包的时候，会让你配置controller：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NzgwMTMyMmVjNDZmYWRiOGNlY2JmNjk2NjBkZjQzZDlfNWU1OTE1Mjc5NzBmZmU2YmY1ZTQxZmI3MTgxMTVlN2ZfSUQ6NzYwNDUzOTI2NzM2MDEzMjA2NF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n以arm这组的`arm_l_controller`为例，意思就是：你要自己写一个`control_msgs::action::FollowJointTrajectory`类型，名字是`/arm_l_controller/follow_joint_trajectory`的Action Server，用来接收moveit传给机械臂的轨迹指令。接到这个指令之后，依据这个轨迹让机械臂动就好了。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NTA5MzY3MzZhYjE1NzRkNDUyODhlODQ2YjUyNWRhOTFfMDRhNmVkZGY4N2FlNmQyZjU4ZjdmZjZiNWU2NzJlZDhfSUQ6NzYwNDUzOTQzMzg5NDgyNDkyNF8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n写好之后，moveit就可以接管机械臂了，同理也可以把末端的夹爪组也接进去：\n\n### moveit task constructor(MTC)\n\n让机械臂去抓一个东西这个过程其实是一个比较复杂的多阶段任务，举个例子就是要先让机械臂到物体前面、手张开、再直着把手伸过去、闭合夹爪、抬起来一点、送到目标位置前面、稍微伸进去一点、然后把手松开，最后再复位。如果涉及到双臂，那就更麻烦了，会涉及到并行的阶段。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MTY5OGYzMDJiZTg1ODIxNDVjMWFmOTc3MDRmYmNmODhfMjk0MzJhMWIzMmQ3YmJiZjJiNjNkNDg0ZDM5ODUxOGFfSUQ6NzU5MzY1MjY5ODgwMTkzMzQ5Ml8xNzgwOTQ1MDY2OjE3ODEwMzE0NjZfVjM)\n\n可以想象的到如果只给你一个从哪到哪的轨迹规划api，剩下的东西都手搓的话需要造多少轮子。（怎么把所有阶段联合起来规划最优解、量化代价、处理并行任务之间的互相干涉、阶段之间的对接...）头铁的话就去慢慢搞状态机、行为树、各种逻辑、各种并行编程、对坐标系，还有搞moveit的那一堆稀烂的api吧。至于最后时间允不允许你把这些东西做出来，那只能说祝你好运。\n\n并不是说自己做这些工作不好，这样自己造轮子确实可以带来很多灵活性，工业界+学术界这么干的人很多，而是在RM这种缺人手还要快速出成果的场景下，想把这种方案的完成度做高非常不现实。\n\n搞moveit的那群人意识到这种\&quot;task construction\&quot;问题的普遍性，所以在moveit上面又造了一层用来解决这种问题的框架，叫mtc。它的功能就是，把一个机械臂任务拆成一些普适性的\&quot;stage\&quot;，然后用户可以用定义一系列stage的方法来定义一个复杂的任务。stage之间产生的交互，mtc会帮你搞定。\n\n这个东西没有binary，不能apt install，需要从源码编译，具体怎么弄看这篇文章\n\nhttps://automaticaddison.com/how-to-set-up-the-moveit-2-task-constructor-ros-2-jazzy/#Install_the_MoveIt_Task_Constructor\n\n结合上面的手眼标定和6d位姿估计，编了一个取能量单元的task，效果非常帅：\n\n[2026-03-15_02-42-37.mp4]\n\n[IMG_6590.MOV]\n\n[20260102-005235.mp4]\n\n## 上下位机的RPC通信\n\n&gt; 2026/6/9: 用CANFD总线跑RPC是错的\n\n上位机需要给下位机下发轨迹指令，因为我的debug需求所以我还要下位机可以通过给上位机发消息的方式来打log，不管是轨迹还是log字符串都是不定长的，如果你自己搓通信协议那复杂程度不亚于dji搞的那个裁判系统串口协议。除开这个你还要维护双向通信session，还有一堆乱七八糟的，这种东西其实就是ros2的那个service机制，而这种机制其实有一个更一般的名字，叫远程调用（rpc）。\n\n### rpc_core\n\n这个技术早已经成熟到不能再成熟了，有grpc、erpc等等老牌框架，但是为了简洁性所以用了一个叫rpc_core的只支持c++的框架，因为它不需要处理跨语言通信所以设计比较简单，而且它几乎自带了所有stl容器的序列化算法，用起来只需要实现一个传输层，然后就可以把各种std:vector、std::string、std::chrono等等发来发去\n\n但是它需要自己实现一个可靠的传输层，它帮你处理数据打包，你自己考虑怎么把打包好的一大串数据可靠的传给对方，这既是优点也是缺点。综合考虑易用性和可靠性我选了canfd当传输层，然后写了一个长数据包分片协议，但是因为can总线有仲裁机制，导致大量丢帧，我不管怎么设计、怎么处理特殊case都没有什么用，连接依然不稳定。\n\n### libcanard\n\nhttps://github.com/OpenCyphal/libcanard\n\n这个项目似乎就能解决问题，libcanard是一个专门给CAN总线设计的rpc框架，后续等我试一试&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/engineer-devlog/index.mdx&quot;],&quot;digest&quot;:[0,&quot;da13a06381e69cae&quot;],&quot;deferredRender&quot;:[0,true],&quot;collection&quot;:[0,&quot;blog&quot;]}],[0,{&quot;id&quot;:[0,&quot;systemd&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;systemd杂谈&quot;],&quot;description&quot;:[0,&quot;pid=1 power&quot;],&quot;date&quot;:[3,&quot;2024-12-05T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;embedded&quot;],[0,&quot;linux&quot;]]],&quot;draft&quot;:[0,false]}],&quot;body&quot;:[0,&quot;- 程序要开机自启\n\n- 在linux下使用串口、socketcan时总是免不了要先打一大堆命令赋权、启动\n\n- 有多个usb设备的情况下不好区分谁是谁，设备文件顺序还会变\n\n利用好当今大多数发行版都有的[`systemd`](https://github.com/systemd/systemd)，它的子组件如udev、systemd-networkd等等就可以解决这些麻烦问题。\n\n如果以后遇到类似的问题，那systemd大概率也是有办法解决的。不要小看PID=1的力量。:)))\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=OTA2NTBkMTk3ZDNiOGQ3M2VmNzg5OTUwNmMzZWU1OThfNGNmYjU4NjZlM2NlOTM2ZGMyMDIwODNkOTAzOGJlMDhfSUQ6NzQ0NDc3NzcxNzkyMDAzODk0MF8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n## systemd-networkd\n\n### socketcan自动bringup\n\n详情：https://wiki.archlinuxcn.org/wiki/Systemd-networkd\n\nsystemd-networkd用来按规则自动配置netdev，正巧can在linux下就是netdev\n\nsystemd-networkd虽然可以配置netdev，但不要举一反三去用它配置以太网接口。目前大多数linux发行版都用另外一个叫NetworkManager的软件来管理网络，同时使用两个软件管理网络可能会引起一些奇怪问题。\n\n为什么不用NetworkManager管理CAN接口？因为它没有这个功能。\n\n&gt; 2025/9/17更新：Ubuntu的最新LTS版本24默认使用netplan作为前端来管理网络了\n\n输入`systemctl status systemd-networkd`查看`systemd-networkd`有没有启动：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YmQ2ZDdjOWQzOGJjNzU3OWE5MWFhZDljNjdmN2ZkODVfMDgxZjRkMTI4ODE2ZWQyZDFiYWIzNzdjMjcyMjZmODdfSUQ6NzQ0NDc2MTYyMzI2NjU1Nzk1Nl8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n如果显示inactive则输入`systemctl start systemd-networkd`启动服务，再输入`systemctl enable systemd-networkd`让服务开机自启。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YmM5MmZjZWM4N2Q4M2FjYTU0MDMwZjZlY2JlZDJlZDBfOTlhNTQ3MTFiYTU1MWRjNDBmYjVlMDEyMzZiOTk5MGFfSUQ6NzQ0NDc2MTkzNTQ0MDM2MzUyMl8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n在`/etc/systemd/network/`文件夹下建立规则`80-can.network`如下：\n\n```Plain Text\n[Match]\nName=can*\n\n[CAN]\nBitRate=1M\n```\n\n此时系统就会自动按规则配置所有CAN接口波特率为1M，并且启动他们，不需要再手动`ip link set`了。\n\n重启一次系统查看效果，如果不想重启，则重启一次systemd-networkd服务：`systemctl restart systemd-networkd`\n\n## udev\n\nudev可以捕获内核产生的设备添加/移除事件，按配置的规则根据端口号、PID、VID等等信息自动识别并配置设备（赋权、创建符号链接等等）\n\n详情：https://www.jinbuguo.com/systemd/udev.html\n\n### 固定USB设备+自动赋权\n\nUSB设备都有VID(Vendor ID)和PID(Product ID)两个识别符，输入`lsusb`列出目前插入的所有usb设备：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=YmNiZDVhOGVlNjQ3ZjA3NzQ3MWFkOTc5MDM0MDQwNWJfMjcyN2NiNGZiY2E2ODc5NWQ1Y2FlOTY0NDIwMWZlMmNfSUQ6NzQ0NDc2NjI3NTg4NzAzODQ2NV8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n以`Bus 001 Device 003: ID 8087:0029 Intel Corp. AX200 Bluetooth`为例：\n\n- busnum=1\n\n- devicenum=3\n\n- vid=8087\n\n- pid=0029\n\n一般来说只根据vid和pid就可以确定一个唯一的usb设备，但如果有两个完全一样的usb设备，就还需要额外根据busnum和devicenum来确定一个唯一的设备。\n\n假设现在有一个usb转串口的CH340模块吧：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=ZjQ1Nzk3ZTg5YzZjNGRmNGI3MzdlZjQ1YzBiOGI4ODFfYWQxMWZhMGU4MzA0Y2MxYmVmZjQ1MmJkYjJjN2U0ZjVfSUQ6NzQ0NDc3OTkyNzY4OTQ0NTQwNF8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=MGRjNzkyMTdkZjE2YjQ3NWFhZjEyOGFjNGVkZDIxZTJfZTIwZDY0NzA4ZDQzYWEyMDAxMzk3N2IxZDc4ZWI5OWVfSUQ6NzQ0NDc4MDA2OTU3NzM0Mjk4MF8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n每次使用它之前，都要输入`sudo chmod 666 /dev/ttyUSB0`来赋权，而且如果有多个一样的模块，就要指定赋权**插在某个USB端口上的，PID为多少，VID为多少**的设备，仅仅通过`/dev`下的文件名肯定是区分不开的。\n\n在`/etc/udev/rules.d/`文件夹下建立规则`100-usbserial.rules`如下：\n\n```Plain Text\nKERNEL==\&quot;ttyUSB*\&quot;,\nATTRS{busnum}==\&quot;1\&quot;,\nATTRS{devnum}==\&quot;8\&quot;,\nATTRS{idVendor}==\&quot;1a86\&quot;,\nATTRS{idProduct}==\&quot;7523\&quot;,\nMODE:=\&quot;0666\&quot;,\nGROUP:=\&quot;dialout\&quot;,\nSYMLINK+=\&quot;my_usb_serial\&quot;\n```\n\n刷新udev：\n\n```Bash\nudevadm control --reload\nudevadm trigger\n```\n\n此时在`/dev`里可以看到一个叫`my_usb_serial`的文件，它就是经过udev配置之后的，之前看到的`ttyUSB0`。之后每次插入符合规则的usb设备时，这个文件都会立即出现。\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NjMxZTNjYTczNTQ1MTFmMmIzOTYxOWMzOWI4NDhjZTNfYjQwOGYxY2JmMmEwOTdiYWUzYmNlNjNhZWM0MGIxNjBfSUQ6NzQ0NDc4NDcxODcwNjYwNjA5OV8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n同理也可以利用udev固定USB转CAN模块，像下面这样，就可以在`busnum=3, devnum=7`的usb转can模块插入之后创建一个叫`my_usb_can`的网络接口：\n\n```Plain Text\nACTION==\&quot;add\&quot;,\nSUBSYSTEM==\&quot;net\&quot;,\nKERNEL==\&quot;can*\&quot;,\nATTRS{busnum}==\&quot;3\&quot;,\nATTRS{devnum}==\&quot;7\&quot;,\nNAME+=\&quot;my_usb_can\&quot;,\nGROUP:=\&quot;dialout\&quot;\n```\n\n## systemd.service\n\n详情：https://www.jinbuguo.com/systemd/systemd.service.html\n\n### 开机自启\n\n把要开机自启的动作编写成一个service，注册给systemd即可实现可控、稳定的开机自启以及fail retry。\n\n比如要让一个ROS节点自启，并且崩溃之后可以自己尝试再自启的话，就先写这样一个启动脚本：\n\n```Bash\n#!/usr/bin/bash\n\n## /home/a/ws/launch.sh\n\nsource /opt/ros/humble/setup.bash\nsource /home/a/ws/install/setup.bash\nros2 launch bringup_pkg bringup.launch.py\n```\n\n然后，编写服务文件`control_node.service`\n\n- `After=network.target`：在系统启动阶段达到`network`目标之后启动这个服务\n\n- `ExecStart=/home/a/ws/launch.sh`：设置entry为启动脚本`/home/a/ws/launch.sh`\n\n- `Restart=always`：自动重启\n\n```Bash\n[Unit]\nAfter=network.target\n \n[Service]\nType=oneshot\nExecStart=/home/a/ws/launch.sh\nRestart=always\n\n\n[Install]\nWantedBy=multi-user.target\n```\n\n把这个`control_node.service`复制到`/usr/lib/systemd/system`目录下，然后执行`systemd daemon-reload`重启systemd daemon。\n\n此时执行`systemctl status control_node`就可以看到注册的服务了：\n\n![Image](https://internal-api-drive-stream.feishu.cn/space/api/box/stream/download/authcode/?code=NGI5NDYyOWFiM2ViZWYzMDEyZTVkZDE0YWMzMDhkMDhfNDdjYTU3ZTkxM2I5N2U0NzIwZDUyZDUwZDY0YTYzYjdfSUQ6NzQ0NDc4OTk5NTI4NTAzNzA4NF8xNzgwOTQ0NDQzOjE3ODEwMzA4NDNfVjM)\n\n执行`systemctl start control_node`即可启动服务，执行`systemctl enable control_node`即可让服务开机自启。\n\n### 不启动桌面环境\n\n为了节省性能，或者是为了加快开机速度等等，可以修改systemd的默认启动target为`multi-user.target`，只启动到终端环境里：\n\n```Bash\nsystemctl set-default multi-user.target\n```\n\n如果要恢复桌面环境，把默认target改回`graphical.target即可`：\n\n```Bash\nsystemctl set-default graphical.target\n```\n\n## systemd-analyze\n\n### 分析开机时间\n\ntodo&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/systemd/index.mdx&quot;],&quot;digest&quot;:[0,&quot;4f864eee90e0c478&quot;],&quot;deferredRender&quot;:[0,true],&quot;collection&quot;:[0,&quot;blog&quot;]}]]]}" ssr client="load" opts="{&quot;name&quot;:&quot;HomeTabs&quot;,&quot;value&quot;:true}" await-children><div data-orientation="horizontal" data-activation-direction="none" class="w-full"><div data-orientation="horizontal" data-activation-direction="none" role="tablist" class="relative z-1 -mb-px flex"><button type="button" data-active="" data-orientation="horizontal" aria-disabled="false" tabindex="-1" role="tab" aria-selected="true" id="base-ui-_r9R_5_" data-composite-item-active="" class="flex items-center justify-center bg-transparent px-3 py-1.5 font-inherit text-sm leading-5 whitespace-nowrap outline-none select-none cursor-pointer border border-transparent text-[var(--color-text-muted)] hover:text-[var(--color-text)] data-active:text-[var(--color-text)] data-active:border-[var(--color-border)] transition-colors">── about</button><button type="button" data-orientation="horizontal" aria-disabled="false" tabindex="-1" role="tab" aria-selected="false" id="base-ui-_r9R_9_" class="flex items-center justify-center bg-transparent px-3 py-1.5 font-inherit text-sm leading-5 whitespace-nowrap outline-none select-none cursor-pointer border border-transparent text-[var(--color-text-muted)] hover:text-[var(--color-text)] data-active:text-[var(--color-text)] data-active:border-[var(--color-border)] transition-colors">── links</button><button type="button" data-orientation="horizontal" aria-disabled="false" tabindex="-1" role="tab" aria-selected="false" id="base-ui-_r9R_d_" class="flex items-center justify-center bg-transparent px-3 py-1.5 font-inherit text-sm leading-5 whitespace-nowrap outline-none select-none cursor-pointer border border-transparent text-[var(--color-text-muted)] hover:text-[var(--color-text)] data-
